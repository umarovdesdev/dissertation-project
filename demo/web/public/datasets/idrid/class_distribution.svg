<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <rect width="700" height="300" fill="white"/>

  <!-- Title -->
  <text x="24" y="32" font-size="16" font-weight="700" fill="#1a1a2e">IDRiD — Class Distribution</text>
  <text x="24" y="50" font-size="11" fill="#999">n = 516 images · Kowa VX-10&#945; · 50° FOV · Clinical validation (Exp 2, 4, 5)</text>

  <!-- Separator -->
  <line x1="24" y1="62" x2="676" y2="62" stroke="#E0E0E0" stroke-width="1"/>

  <!-- DR 0 — 32.6% -->
  <text x="110" y="96" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 0</text>
  <text x="110" y="108" text-anchor="end" font-size="9" fill="#999">No DR</text>
  <rect x="120" y="84" width="163" height="28" rx="3" fill="#2E7D32" opacity="0.82"/>
  <text x="130" y="103" font-size="11" fill="white" font-weight="600">32.6%</text>
  <text x="293" y="103" font-size="10" fill="#666">168</text>

  <!-- DR 1 — 4.8% -->
  <text x="110" y="138" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 1</text>
  <text x="110" y="150" text-anchor="end" font-size="9" fill="#999">Mild</text>
  <rect x="120" y="126" width="24" height="28" rx="3" fill="#F9A825" opacity="0.82"/>
  <text x="152" y="145" font-size="10" fill="#666" font-weight="600">4.8%</text>
  <text x="194" y="145" font-size="10" fill="#888">25</text>

  <!-- DR 2 — 32.6% -->
  <text x="110" y="180" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 2</text>
  <text x="110" y="192" text-anchor="end" font-size="9" fill="#999">Moderate</text>
  <rect x="120" y="168" width="163" height="28" rx="3" fill="#EF6C00" opacity="0.82"/>
  <text x="130" y="187" font-size="11" fill="white" font-weight="600">32.6%</text>
  <text x="293" y="187" font-size="10" fill="#666">168</text>

  <!-- DR 3 — 18.0% -->
  <text x="110" y="222" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 3</text>
  <text x="110" y="234" text-anchor="end" font-size="9" fill="#999">Severe</text>
  <rect x="120" y="210" width="90" height="28" rx="3" fill="#D32F2F" opacity="0.82"/>
  <text x="130" y="229" font-size="11" fill="white" font-weight="600">18.0%</text>
  <text x="220" y="229" font-size="10" fill="#666">93</text>

  <!-- DR 4 — 12.0% -->
  <text x="110" y="264" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 4</text>
  <text x="110" y="276" text-anchor="end" font-size="9" fill="#999">PDR</text>
  <rect x="120" y="252" width="60" height="28" rx="3" fill="#6A1B9A" opacity="0.82"/>
  <text x="130" y="271" font-size="10" fill="white" font-weight="600">12.0%</text>
  <text x="190" y="271" font-size="10" fill="#666">62</text>

  <!-- Annotation -->
  <text x="24" y="296" font-size="10" fill="#1D9E75" font-weight="600">Most balanced DR distribution — 81 images with pixel-level lesion masks (MA, HE, EX, SE)</text>
</svg>
