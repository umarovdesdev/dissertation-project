<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <rect width="700" height="300" fill="white"/>

  <!-- Title -->
  <text x="24" y="32" font-size="16" font-weight="700" fill="#1a1a2e">APTOS 2019 — Class Distribution</text>
  <text x="24" y="50" font-size="11" fill="#999">n = 3,662 images · Various cameras · Transfer target (Exp 3, H-4)</text>

  <!-- Separator -->
  <line x1="24" y1="62" x2="676" y2="62" stroke="#E0E0E0" stroke-width="1"/>

  <!-- DR 0 — 49.3% -->
  <text x="110" y="96" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 0</text>
  <text x="110" y="108" text-anchor="end" font-size="9" fill="#999">No DR</text>
  <rect x="120" y="84" width="247" height="28" rx="3" fill="#2E7D32" opacity="0.82"/>
  <text x="130" y="103" font-size="11" fill="white" font-weight="600">49.3%</text>
  <text x="377" y="103" font-size="10" fill="#666">1,805</text>

  <!-- DR 1 — 10.1% -->
  <text x="110" y="138" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 1</text>
  <text x="110" y="150" text-anchor="end" font-size="9" fill="#999">Mild</text>
  <rect x="120" y="126" width="51" height="28" rx="3" fill="#F9A825" opacity="0.82"/>
  <text x="179" y="145" font-size="10" fill="#666" font-weight="600">10.1%</text>
  <text x="226" y="145" font-size="10" fill="#888">370</text>

  <!-- DR 2 — 27.3% -->
  <text x="110" y="180" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 2</text>
  <text x="110" y="192" text-anchor="end" font-size="9" fill="#999">Moderate</text>
  <rect x="120" y="168" width="137" height="28" rx="3" fill="#EF6C00" opacity="0.82"/>
  <text x="130" y="187" font-size="11" fill="white" font-weight="600">27.3%</text>
  <text x="267" y="187" font-size="10" fill="#666">999</text>

  <!-- DR 3 — 5.3% -->
  <text x="110" y="222" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 3</text>
  <text x="110" y="234" text-anchor="end" font-size="9" fill="#999">Severe</text>
  <rect x="120" y="210" width="27" height="28" rx="3" fill="#D32F2F" opacity="0.82"/>
  <text x="155" y="229" font-size="10" fill="#666" font-weight="600">5.3%</text>
  <text x="197" y="229" font-size="10" fill="#888">193</text>

  <!-- DR 4 — 8.1% -->
  <text x="110" y="264" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 4</text>
  <text x="110" y="276" text-anchor="end" font-size="9" fill="#999">PDR</text>
  <rect x="120" y="252" width="41" height="28" rx="3" fill="#6A1B9A" opacity="0.82"/>
  <text x="169" y="271" font-size="10" fill="#666" font-weight="600">8.1%</text>
  <text x="211" y="271" font-size="10" fill="#888">295</text>

  <!-- Annotation -->
  <text x="24" y="296" font-size="10" fill="#7F77DD" font-weight="600">More balanced than EyePACS (DR 0 = 49% vs 74%) — Indian population, Aravind Eye Hospital screening</text>
</svg>
