<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 880" width="500" height="880">
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#000000"/>
    </marker>
    <style>
      .ttl  { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 600; fill: #111827; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-weight: 500; fill: #111827; }
      .edge { fill: none; stroke: #000000; stroke-width: 1.8; }
    </style>
  </defs>

  <rect width="500" height="880" fill="#ffffff"/>

  <!-- Input -->
  <g>
    <rect x="40" y="30" width="420" height="60" rx="4" fill="#1f2937" fill-opacity="0.10" stroke="#1f2937" stroke-width="2"/>
    <text x="250" y="66" text-anchor="middle" class="ttl" font-size="18">Fundus photograph</text>
  </g>
  <line x1="250" y1="92" x2="250" y2="112" class="edge" marker-end="url(#arrowhead)"/>

  <!-- Stage 0: Canonical Flip (geometry) -->
  <g>
    <rect x="40" y="114" width="420" height="60" rx="4" fill="#0d9488" fill-opacity="0.10" stroke="#0d9488" stroke-width="2"/>
    <text x="250" y="150" text-anchor="middle" class="ttl" font-size="18">Canonical Flip</text>
  </g>
  <line x1="250" y1="176" x2="250" y2="196" class="edge" marker-end="url(#arrowhead)"/>

  <!-- Stage 1: OD-Fovea Rotation (geometry) -->
  <g>
    <rect x="40" y="198" width="420" height="60" rx="4" fill="#0d9488" fill-opacity="0.10" stroke="#0d9488" stroke-width="2"/>
    <text x="250" y="234" text-anchor="middle" class="ttl" font-size="18">OD-Fovea Rotation</text>
  </g>
  <line x1="250" y1="260" x2="250" y2="280" class="edge" marker-end="url(#arrowhead)"/>

  <!-- Stage 2: FOV Crop + Isotropic Resize (geometry) -->
  <g>
    <rect x="40" y="282" width="420" height="60" rx="4" fill="#0d9488" fill-opacity="0.10" stroke="#0d9488" stroke-width="2"/>
    <text x="250" y="318" text-anchor="middle" class="ttl" font-size="18">FOV Crop + Isotropic Resize</text>
  </g>
  <line x1="250" y1="344" x2="250" y2="364" class="edge" marker-end="url(#arrowhead)"/>

  <!-- Stage 3: FOV Mask Generation (geometry) -->
  <g>
    <rect x="40" y="366" width="420" height="60" rx="4" fill="#0d9488" fill-opacity="0.10" stroke="#0d9488" stroke-width="2"/>
    <text x="250" y="402" text-anchor="middle" class="ttl" font-size="18">FOV Mask Generation</text>
  </g>
  <line x1="250" y1="428" x2="250" y2="448" class="edge" marker-end="url(#arrowhead)"/>

  <!-- Stage 4: Adaptive Flat-Field (photometric) -->
  <g>
    <rect x="40" y="450" width="420" height="60" rx="4" fill="#c2410c" fill-opacity="0.10" stroke="#c2410c" stroke-width="2"/>
    <text x="250" y="486" text-anchor="middle" class="ttl" font-size="18">Adaptive Flat-Field</text>
  </g>
  <line x1="250" y1="512" x2="250" y2="532" class="edge" marker-end="url(#arrowhead)"/>

  <!-- Stage 5: Dual-Constraint CLAHE (photometric) -->
  <g>
    <rect x="40" y="534" width="420" height="60" rx="4" fill="#c2410c" fill-opacity="0.10" stroke="#c2410c" stroke-width="2"/>
    <text x="250" y="570" text-anchor="middle" class="ttl" font-size="18">Dual-Constraint CLAHE</text>
  </g>
  <line x1="250" y1="596" x2="250" y2="616" class="edge" marker-end="url(#arrowhead)"/>

  <!-- Stage 6: Augmentation (train only, dashed border) -->
  <g>
    <rect x="40" y="618" width="420" height="60" rx="4" fill="#6d28d9" fill-opacity="0.10" stroke="#6d28d9" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="250" y="654" text-anchor="middle" class="ttl" font-size="18">Augmentation</text>
  </g>
  <line x1="250" y1="680" x2="250" y2="700" class="edge" marker-end="url(#arrowhead)"/>

  <!-- Stage 7: Normalize + Mask Append (normalization) -->
  <g>
    <rect x="40" y="702" width="420" height="60" rx="4" fill="#9f1239" fill-opacity="0.10" stroke="#9f1239" stroke-width="2"/>
    <text x="250" y="738" text-anchor="middle" class="ttl" font-size="18">Normalize + Mask Append</text>
  </g>
  <line x1="250" y1="764" x2="250" y2="784" class="edge" marker-end="url(#arrowhead)"/>

  <!-- Output -->
  <g>
    <rect x="40" y="786" width="420" height="60" rx="4" fill="#1f2937" fill-opacity="0.10" stroke="#1f2937" stroke-width="2"/>
    <text x="250" y="822" text-anchor="middle" class="mono" font-size="16">tensor (4, 512, 512) · float32</text>
  </g>
</svg>
