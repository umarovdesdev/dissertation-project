<svg width="100%" viewBox="0 0 700 1380" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .box-input { fill: #444441; stroke: #B4B2A9; stroke-width: 0.5; }
    .box-stage { fill: #085041; stroke: #5DCAA5; stroke-width: 0.5; }
    .box-train { fill: #633806; stroke: #EFB45C; stroke-width: 0.5; }
    .box-output { fill: #0C447C; stroke: #6FB4F0; stroke-width: 0.5; }
    .text-title { fill: #9FE1CB; font-size: 14px; font-weight: 500; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .text-detail { fill: #5DCAA5; font-size: 12px; font-weight: 400; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .text-input { fill: #D3D1C7; font-size: 14px; font-weight: 500; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .text-output { fill: #6FB4F0; font-size: 14px; font-weight: 500; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .text-output-detail { fill: #6FB4F0; font-size: 12px; font-weight: 400; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .text-train-title { fill: #EFB45C; font-size: 14px; font-weight: 500; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .text-train-detail { fill: #EFB45C; font-size: 12px; font-weight: 400; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .arrow-line { fill: none; stroke: #9C9A92; stroke-width: 1.5; }
    .badge-train { fill: #633806; stroke: #EFB45C; stroke-width: 0.5; }
    .badge-text-train { fill: #EFB45C; font-size: 11px; font-weight: 400; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .param-text { fill: #C2C0B6; font-size: 11px; font-weight: 400; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .legend-text { fill: #C2C0B6; font-size: 12px; font-weight: 400; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  </style>
</defs>

<!-- Background -->
<rect width="700" height="1380" fill="transparent"/>

<!-- Legend -->
<g transform="translate(10, 10)">
  <rect x="0" y="0" width="18" height="14" rx="3" class="box-stage"/>
  <text x="24" y="11" class="legend-text">always-on stage</text>
  <rect x="150" y="0" width="18" height="14" rx="3" class="box-train"/>
  <text x="174" y="11" class="legend-text">train-only stage</text>
  <rect x="310" y="0" width="18" height="14" rx="3" class="box-input"/>
  <text x="334" y="11" class="legend-text">data flow</text>
  <rect x="430" y="0" width="18" height="14" rx="3" class="box-output"/>
  <text x="454" y="11" class="legend-text">output / CNN input</text>
</g>

<!-- Input node -->
<g>
  <rect x="200" y="40" width="300" height="44" rx="8" class="box-input"/>
  <text x="350" y="62" text-anchor="middle" dominant-baseline="central" class="text-input">Raw Fundus Image (RGB, H x W x 3)</text>
</g>

<!-- Arrow -->
<line x1="350" y1="84" x2="350" y2="110" marker-end="url(#arrow)" class="arrow-line"/>

<!-- Stage 0: Canonical Flip -->
<g>
  <rect x="170" y="112" width="360" height="56" rx="8" class="box-stage"/>
  <text x="350" y="132" text-anchor="middle" dominant-baseline="central" class="text-title">Stage 0 : Canonical Flip</text>
  <text x="350" y="152" text-anchor="middle" dominant-baseline="central" class="text-detail">OS (left eye) -> horizontal flip -> OD orientation</text>
</g>

<!-- Arrow -->
<line x1="350" y1="168" x2="350" y2="194" marker-end="url(#arrow)" class="arrow-line"/>

<!-- Stage 1: OD-Fovea Rotation -->
<g>
  <rect x="150" y="196" width="400" height="56" rx="8" class="box-stage"/>
  <text x="350" y="216" text-anchor="middle" dominant-baseline="central" class="text-title">Stage 1 : OD-Fovea Rotation Normalization</text>
  <text x="350" y="236" text-anchor="middle" dominant-baseline="central" class="text-detail">Detect OD + fovea, rotate to horizontal axis</text>
</g>

<!-- Arrow -->
<line x1="350" y1="252" x2="350" y2="278" marker-end="url(#arrow)" class="arrow-line"/>

<!-- Stage 2: FOV Crop + Isotropic Resize -->
<g>
  <rect x="130" y="280" width="440" height="68" rx="8" class="box-stage"/>
  <text x="350" y="300" text-anchor="middle" dominant-baseline="central" class="text-title">Stage 2 : FOV Crop + Isotropic Resize</text>
  <text x="350" y="320" text-anchor="middle" dominant-baseline="central" class="text-detail">Detect FOV boundary -> isotropic scale -> 512 x 512</text>
  <text x="350" y="336" text-anchor="middle" dominant-baseline="central" class="param-text">Zero-pad to preserve circular geometry (not stretch-resize)</text>
</g>

<!-- Branch point after Stage 2 -->
<circle cx="350" cy="370" r="4" fill="#9C9A92"/>

<!-- Main arrow: Stage 2 -> Stage 4 (through branch point) -->
<line x1="350" y1="348" x2="350" y2="450" marker-end="url(#arrow)" class="arrow-line"/>

<!-- Branch to Stage 3 (dashed, right-angle) -->
<polyline points="354,370 577,370 577,394" fill="none" stroke="#9C9A92" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

<!-- Stage 3: FOV Mask (side branch) -->
<g>
  <rect x="480" y="396" width="195" height="52" rx="8" class="box-stage"/>
  <text x="577" y="416" text-anchor="middle" dominant-baseline="central" class="text-title">Stage 3 : FOV Mask</text>
  <text x="577" y="434" text-anchor="middle" dominant-baseline="central" class="text-detail">Binary mask (1.0 / 0.0)</text>
</g>

<!-- FOV mask dashed line down to Stage 7 -->
<line x1="577" y1="448" x2="577" y2="955" stroke="#9C9A92" stroke-width="1.5" stroke-dasharray="4,3" fill="none"/>
<line x1="577" y1="955" x2="550" y2="955" marker-end="url(#arrow)" stroke="#9C9A92" stroke-width="1.5" fill="none"/>
<text x="591" y="700" class="param-text" transform="rotate(90, 591, 700)" text-anchor="middle">4th channel (appended at Stage 7)</text>

<!-- Stage 4: Adaptive Flat-Field Correction -->
<g>
  <rect x="160" y="452" width="380" height="68" rx="8" class="box-stage"/>
  <text x="350" y="472" text-anchor="middle" dominant-baseline="central" class="text-title">Stage 4 : Adaptive Flat-Field Correction</text>
  <text x="350" y="492" text-anchor="middle" dominant-baseline="central" class="text-detail">I' = I - GaussianBlur(I, sigma) + 128</text>
  <text x="350" y="508" text-anchor="middle" dominant-baseline="central" class="param-text">sigma = 0.07 x D (adaptive to FOV diameter)</text>
</g>

<!-- Arrow -->
<line x1="350" y1="520" x2="350" y2="546" marker-end="url(#arrow)" class="arrow-line"/>

<!-- Stage 5: CLAHE -->
<g>
  <rect x="160" y="548" width="380" height="80" rx="8" class="box-stage"/>
  <text x="350" y="568" text-anchor="middle" dominant-baseline="central" class="text-title">Stage 5 : CLAHE (Dual-Constraint)</text>
  <text x="350" y="588" text-anchor="middle" dominant-baseline="central" class="text-detail">LAB L-channel only, tile 8x8</text>
  <text x="350" y="606" text-anchor="middle" dominant-baseline="central" class="param-text">CL = min(clip_factor x tile_area/256, threshold x tile_area)</text>
  <text x="350" y="620" text-anchor="middle" dominant-baseline="central" class="param-text">Default: clip_factor=2.0, threshold=0.01</text>
</g>
<!-- Stochastic annotation (left of box) -->
<text x="148" y="582" text-anchor="end" class="param-text">Stochastic (p=0.8)</text>
<text x="148" y="596" text-anchor="end" class="param-text">during training</text>

<!-- Arrow to decision diamond -->
<line x1="350" y1="628" x2="350" y2="650" marker-end="url(#arrow)" class="arrow-line"/>

<!-- Decision diamond: mode? -->
<polygon points="350,652 415,678 350,704 285,678" class="box-input"/>
<text x="350" y="678" text-anchor="middle" dominant-baseline="central" class="text-input">mode?</text>

<!-- Train branch (left) -->
<polyline points="285,678 190,678 190,730" fill="none" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="237" y="668" class="param-text">train</text>

<!-- Inference branch (right) -->
<polyline points="415,678 490,678 490,872 355,872" fill="none" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="452" y="668" class="param-text">inference</text>
<text x="502" y="775" class="param-text" transform="rotate(90, 502, 775)" text-anchor="middle">skip augmentation</text>

<!-- Stage 6: Augmentation (Train Only) -->
<g>
  <rect x="20" y="732" width="340" height="92" rx="8" class="box-train"/>
  <text x="190" y="752" text-anchor="middle" dominant-baseline="central" class="text-train-title">Stage 6 : Augmentation (Train Only)</text>
  <text x="190" y="772" text-anchor="middle" dominant-baseline="central" class="text-train-detail">Unified affine: rotation (adaptive sigma), zoom, shear</text>
  <text x="190" y="790" text-anchor="middle" dominant-baseline="central" class="text-train-detail">ColorJitter + Gaussian noise + JPEG compression</text>
  <text x="190" y="808" text-anchor="middle" dominant-baseline="central" class="param-text">Rotation sigma from Stage 1 OD-fovea confidence</text>
</g>
<!-- Train-only badge -->
<rect x="370" y="744" width="80" height="20" rx="10" class="badge-train"/>
<text x="410" y="755" text-anchor="middle" dominant-baseline="central" class="badge-text-train">train-only</text>

<!-- Train path to merge -->
<line x1="190" y1="824" x2="190" y2="872" class="arrow-line"/>
<line x1="190" y1="872" x2="345" y2="872" marker-end="url(#arrow)" class="arrow-line"/>

<!-- Merge point -->
<circle cx="350" cy="872" r="5" fill="#9C9A92"/>

<!-- Arrow to Stage 7 -->
<line x1="350" y1="877" x2="350" y2="908" marker-end="url(#arrow)" class="arrow-line"/>

<!-- Stage 7: Dataset-Specific Normalize + Mask Append -->
<g>
  <rect x="150" y="910" width="400" height="80" rx="8" class="box-stage"/>
  <text x="350" y="930" text-anchor="middle" dominant-baseline="central" class="text-title">Stage 7 : Dataset-Specific Normalize + Mask Append</text>
  <text x="350" y="950" text-anchor="middle" dominant-baseline="central" class="text-detail">RGB -> float32, per-channel normalize (dataset stats)</text>
  <text x="350" y="968" text-anchor="middle" dominant-baseline="central" class="text-detail">Append FOV mask as channel 4</text>
  <text x="350" y="984" text-anchor="middle" dominant-baseline="central" class="param-text">NOT ImageNet stats -- computed from training set</text>
</g>

<!-- Arrow -->
<line x1="350" y1="990" x2="350" y2="1020" marker-end="url(#arrow)" class="arrow-line"/>

<!-- Output node -->
<g>
  <rect x="190" y="1022" width="320" height="56" rx="8" class="box-output"/>
  <text x="350" y="1042" text-anchor="middle" dominant-baseline="central" class="text-output">CNN-Ready Tensor (4, 512, 512)</text>
  <text x="350" y="1062" text-anchor="middle" dominant-baseline="central" class="text-output-detail">3 RGB channels + 1 FOV mask channel</text>
</g>

<!-- Per-patient binocular path -->
<line x1="350" y1="1078" x2="350" y2="1104" class="arrow-line"/>
<circle cx="350" cy="1104" r="4" fill="#9C9A92"/>
<text x="350" y="1093" text-anchor="middle" class="param-text">per eye</text>

<!-- Branch to OD and OS -->
<polyline points="346,1104 230,1104 230,1120" fill="none" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>
<polyline points="354,1104 470,1104 470,1120" fill="none" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- OD (right eye) -->
<g>
  <rect x="160" y="1122" width="140" height="32" rx="8" class="box-input"/>
  <text x="230" y="1138" text-anchor="middle" dominant-baseline="central" class="text-input">OD (right eye)</text>
</g>

<!-- OS (left eye) -->
<g>
  <rect x="400" y="1122" width="140" height="32" rx="8" class="box-input"/>
  <text x="470" y="1138" text-anchor="middle" dominant-baseline="central" class="text-input">OS (left eye)</text>
</g>

<!-- Arrows converge to shared backbone -->
<line x1="230" y1="1154" x2="230" y2="1178" marker-end="url(#arrow)" class="arrow-line"/>
<line x1="470" y1="1154" x2="470" y2="1178" marker-end="url(#arrow)" class="arrow-line"/>

<!-- Shared CNN Backbone -->
<g>
  <rect x="170" y="1180" width="360" height="48" rx="8" class="box-output"/>
  <text x="350" y="1197" text-anchor="middle" dominant-baseline="central" class="text-output">Shared CNN Backbone</text>
  <text x="350" y="1215" text-anchor="middle" dominant-baseline="central" class="text-output-detail">ResNet-50 / EfficientNet-B3</text>
</g>

<!-- Arrow -->
<line x1="350" y1="1228" x2="350" y2="1254" marker-end="url(#arrow)" class="arrow-line"/>

<!-- PatientHead — Binocular Fusion -->
<g>
  <rect x="155" y="1256" width="390" height="56" rx="8" class="box-output"/>
  <text x="350" y="1276" text-anchor="middle" dominant-baseline="central" class="text-output">PatientHead — Binocular Fusion</text>
  <text x="350" y="1296" text-anchor="middle" dominant-baseline="central" class="text-output-detail">concat(f_L, f_R, |f_L − f_R|) → MLP</text>
</g>
<text x="555" y="1276" class="param-text">Configs E, F</text>

<!-- Arrow -->
<line x1="350" y1="1312" x2="350" y2="1338" marker-end="url(#arrow)" class="arrow-line"/>

<!-- Prediction -->
<g>
  <rect x="240" y="1340" width="220" height="30" rx="8" class="box-input"/>
  <text x="350" y="1355" text-anchor="middle" dominant-baseline="central" class="text-input">DR Grade 0-4 Prediction</text>
</g>

</svg>
