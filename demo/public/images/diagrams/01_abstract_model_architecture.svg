<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 900" width="1280" height="900">
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#000000"/>
    </marker>
    <style>
      .ttl    { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 600; fill: #111827; }
      .ttl-em { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 700; fill: #111827; }
      .sub    { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 400; fill: #374151; }
      .sub-em { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 600; fill: #111827; }
      .cfg    { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 600; fill: #111827; }
      .edge   { fill: none; stroke: #000000; stroke-width: 1.8; }
    </style>
  </defs>

  <rect width="1280" height="900" fill="#ffffff"/>

  <!-- ============ Input ============ -->
  <g>
    <rect x="460" y="60" width="360" height="80" rx="4" fill="#1f2937" fill-opacity="0.10" stroke="#1f2937" stroke-width="2"/>
    <text x="640" y="110" text-anchor="middle" class="ttl-em" font-size="22">Input: fundus photograph</text>
  </g>

  <!-- Arrows: Input → preprocessing -->
  <line x1="640" y1="140" x2="320" y2="238" class="edge" marker-end="url(#arrowhead)"/>
  <line x1="640" y1="140" x2="960" y2="238" class="edge" marker-end="url(#arrowhead)"/>

  <!-- ============ Baseline preprocessing ============ -->
  <g>
    <rect x="130" y="240" width="320" height="120" rx="4" fill="#475569" fill-opacity="0.13" stroke="#475569" stroke-width="2"/>
    <text x="290" y="290" text-anchor="middle" class="ttl" font-size="22">Baseline preprocessing</text>
    <text x="290" y="324" text-anchor="middle" class="sub" font-size="14">ImageNet normalize  ·  3 channels</text>
  </g>

  <!-- ============ Pipeline preprocessing ============ -->
  <g>
    <rect x="830" y="240" width="320" height="120" rx="4" fill="#166534" fill-opacity="0.14" stroke="#166534" stroke-width="2"/>
    <text x="990" y="282" text-anchor="middle" class="ttl" font-size="22">Pipeline preprocessing</text>
    <text x="990" y="312" text-anchor="middle" class="sub" font-size="13">8 stages  ·  4 channels (RGB + FOV mask)</text>
    <text x="990" y="338" text-anchor="middle" class="sub-em" font-size="14">dataset-specific normalize</text>
  </g>

  <!-- ============ Four factorial paths (preprocessing → CNN) ============ -->
  <!-- Config A: Baseline → ResNet-50 (vertical at x=260) -->
  <line x1="260" y1="360" x2="260" y2="518" class="edge" marker-end="url(#arrowhead)"/>
  <!-- Config B: Pipeline → ResNet-50 (diagonal upper-right → lower-left) -->
  <line x1="930" y1="360" x2="360" y2="518" class="edge" marker-end="url(#arrowhead)"/>
  <!-- Config C: Baseline → EfficientNet-B3 (diagonal upper-left → lower-right) -->
  <line x1="350" y1="360" x2="920" y2="518" class="edge" marker-end="url(#arrowhead)"/>
  <!-- Config D: Pipeline → EfficientNet-B3 (vertical at x=1020) -->
  <line x1="1020" y1="360" x2="1020" y2="518" class="edge" marker-end="url(#arrowhead)"/>

  <!-- ============ Config labels (all at y=420, on their actual lines) ============ -->
  <!-- Config A on vertical x=260 -->
  <g>
    <rect x="221" y="407" width="78" height="26" rx="3" fill="#ffffff" stroke="#111827" stroke-width="1"/>
    <text x="260" y="425" text-anchor="middle" class="cfg" font-size="14">Config A</text>
  </g>
  <!-- Config C on Baseline → EfficientNet diagonal at (567, 420) [upper-left half] -->
  <g>
    <rect x="528" y="407" width="78" height="26" rx="3" fill="#ffffff" stroke="#111827" stroke-width="1"/>
    <text x="567" y="425" text-anchor="middle" class="cfg" font-size="14">Config C</text>
  </g>
  <!-- Config B on Pipeline → ResNet diagonal at (714, 420) [upper-right half] -->
  <g>
    <rect x="675" y="407" width="78" height="26" rx="3" fill="#ffffff" stroke="#111827" stroke-width="1"/>
    <text x="714" y="425" text-anchor="middle" class="cfg" font-size="14">Config B</text>
  </g>
  <!-- Config D on vertical x=1020 -->
  <g>
    <rect x="981" y="407" width="78" height="26" rx="3" fill="#ffffff" stroke="#111827" stroke-width="1"/>
    <text x="1020" y="425" text-anchor="middle" class="cfg" font-size="14">Config D</text>
  </g>

  <!-- ============ ResNet-50 ============ -->
  <g>
    <rect x="130" y="520" width="320" height="120" rx="4" fill="#1e3a8a" fill-opacity="0.10" stroke="#1e3a8a" stroke-width="2"/>
    <text x="290" y="562" text-anchor="middle" class="ttl" font-size="22">ResNet-50</text>
    <text x="290" y="592" text-anchor="middle" class="sub" font-size="14">CNN backbone</text>
    <text x="290" y="614" text-anchor="middle" class="sub" font-size="14">ImageNet-pretrained</text>
  </g>

  <!-- ============ EfficientNet-B3 ============ -->
  <g>
    <rect x="830" y="520" width="320" height="120" rx="4" fill="#1e3a8a" fill-opacity="0.10" stroke="#1e3a8a" stroke-width="2"/>
    <text x="990" y="562" text-anchor="middle" class="ttl" font-size="22">EfficientNet-B3</text>
    <text x="990" y="592" text-anchor="middle" class="sub" font-size="14">CNN backbone</text>
    <text x="990" y="614" text-anchor="middle" class="sub-em" font-size="14">Dataset-specific pretrained</text>
  </g>

  <!-- Arrows: CNN → Output -->
  <line x1="290" y1="640" x2="615" y2="798" class="edge" marker-end="url(#arrowhead)"/>
  <line x1="990" y1="640" x2="665" y2="798" class="edge" marker-end="url(#arrowhead)"/>

  <!-- ============ Output ============ -->
  <g>
    <rect x="350" y="800" width="580" height="80" rx="4" fill="#9f1239" fill-opacity="0.10" stroke="#9f1239" stroke-width="2"/>
    <text x="640" y="846" text-anchor="middle" class="ttl-em" font-size="17">Output:  5-class DR grade  ·  explainable attention map</text>
  </g>
</svg>
