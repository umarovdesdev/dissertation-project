<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <rect width="640" height="340" fill="white" rx="6"/>
  <rect x="0" y="0" width="6" height="340" fill="#378ADD" rx="3 0 0 3"/>

  <!-- Header -->
  <text x="24" y="30" font-size="18" font-weight="700" fill="#1a1a2e">EyePACS</text>
  <rect x="112" y="16" width="62" height="20" rx="4" fill="#E6F1FB"/>
  <text x="143" y="30" text-anchor="middle" font-size="10" font-weight="600" fill="#0C447C">Training</text>
  <text x="24" y="48" font-size="11" fill="#888">~35,126 labeled images · Primary training and evaluation dataset</text>
  <line x1="24" y1="58" x2="616" y2="58" stroke="#E8E8E6" stroke-width="1"/>

  <!-- Metadata grid -->
  <text x="24" y="80" font-size="9" fill="#999" font-weight="600" letter-spacing="0.5">CAMERA</text>
  <text x="24" y="94" font-size="11" fill="#333" font-weight="500">Canon CR-1 (non-mydriatic)</text>

  <text x="240" y="80" font-size="9" fill="#999" font-weight="600" letter-spacing="0.5">FOV</text>
  <text x="240" y="94" font-size="11" fill="#333" font-weight="500">45°</text>

  <text x="340" y="80" font-size="9" fill="#999" font-weight="600" letter-spacing="0.5">FORMAT</text>
  <text x="340" y="94" font-size="11" fill="#333" font-weight="500">JPEG</text>

  <text x="440" y="80" font-size="9" fill="#999" font-weight="600" letter-spacing="0.5">SOURCE</text>
  <text x="440" y="94" font-size="11" fill="#333" font-weight="500">Kaggle (Public)</text>

  <text x="24" y="118" font-size="9" fill="#999" font-weight="600" letter-spacing="0.5">RESOLUTION</text>
  <text x="24" y="132" font-size="11" fill="#333" font-weight="500">3888&#215;2592 to 5184&#215;3456</text>

  <text x="240" y="118" font-size="9" fill="#999" font-weight="600" letter-spacing="0.5">TAXONOMY</text>
  <text x="240" y="132" font-size="11" fill="#333" font-weight="500">5-class ICDR (DR 0&#8211;4) — native</text>

  <text x="500" y="118" font-size="9" fill="#999" font-weight="600" letter-spacing="0.5">POPULATION</text>
  <text x="500" y="132" font-size="11" fill="#333" font-weight="500">US (California)</text>

  <line x1="24" y1="146" x2="616" y2="146" stroke="#E8E8E6" stroke-width="1"/>

  <!-- Role -->
  <text x="24" y="166" font-size="9" fill="#999" font-weight="600" letter-spacing="0.5">ROLE IN DISSERTATION</text>
  <text x="24" y="182" font-size="11" fill="#444" xml:space="preserve">Primary training and evaluation dataset for Experiments 1 and 2. All models trained</text>
  <text x="24" y="196" font-size="11" fill="#444" xml:space="preserve">on EyePACS; serves as in-domain reference for generalization ratio G.</text>

  <!-- Split strategy -->
  <text x="24" y="220" font-size="9" fill="#999" font-weight="600" letter-spacing="0.5">SPLIT STRATEGY</text>
  <text x="24" y="236" font-size="11" fill="#444">5-fold patient-level stratified CV. Both eyes of same patient always in same fold.</text>

  <line x1="24" y1="250" x2="616" y2="250" stroke="#E8E8E6" stroke-width="1"/>

  <!-- Experiments -->
  <text x="24" y="270" font-size="9" fill="#999" font-weight="600" letter-spacing="0.5">EXPERIMENTS</text>
  <rect x="24" y="278" width="76" height="20" rx="4" fill="#E6F1FB"/>
  <text x="62" y="292" text-anchor="middle" font-size="10" font-weight="500" fill="#0C447C">Exp 1 (H-1)</text>
  <rect x="108" y="278" width="76" height="20" rx="4" fill="#E6F1FB"/>
  <text x="146" y="292" text-anchor="middle" font-size="10" font-weight="500" fill="#0C447C">Exp 2 (H-2)</text>

  <!-- Key stat -->
  <rect x="24" y="310" width="592" height="22" rx="4" fill="#FAEEDA"/>
  <text x="32" y="325" font-size="10" fill="#633806" font-weight="500">Class imbalance: DR 0 = 73.5% — justifies Focal Loss (&#947;=2) and stratified sampling</text>
</svg>
