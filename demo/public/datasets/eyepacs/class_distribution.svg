<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <rect width="700" height="300" fill="white"/>

  <!-- Title -->
  <text x="24" y="32" font-size="16" font-weight="700" fill="#1a1a2e">EyePACS — Class Distribution</text>
  <text x="24" y="50" font-size="11" fill="#999">n = 35,126 labeled images · Canon CR-1 · 45° FOV · Training dataset</text>

  <!-- Separator -->
  <line x1="24" y1="62" x2="676" y2="62" stroke="#E0E0E0" stroke-width="1"/>

  <!-- DR 0 — 73.5% -->
  <text x="110" y="96" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 0</text>
  <text x="110" y="108" text-anchor="end" font-size="9" fill="#999">No DR</text>
  <rect x="120" y="84" width="368" height="28" rx="3" fill="#2E7D32" opacity="0.82"/>
  <text x="130" y="103" font-size="11" fill="white" font-weight="600">73.5%</text>
  <text x="498" y="103" font-size="10" fill="#666">25,810</text>

  <!-- DR 1 — 6.9% -->
  <text x="110" y="138" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 1</text>
  <text x="110" y="150" text-anchor="end" font-size="9" fill="#999">Mild</text>
  <rect x="120" y="126" width="35" height="28" rx="3" fill="#F9A825" opacity="0.82"/>
  <text x="163" y="145" font-size="10" fill="#666" font-weight="600">6.9%</text>
  <text x="210" y="145" font-size="10" fill="#888">2,443</text>

  <!-- DR 2 — 15.1% -->
  <text x="110" y="180" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 2</text>
  <text x="110" y="192" text-anchor="end" font-size="9" fill="#999">Moderate</text>
  <rect x="120" y="168" width="76" height="28" rx="3" fill="#EF6C00" opacity="0.82"/>
  <text x="130" y="187" font-size="11" fill="white" font-weight="600">15.1%</text>
  <text x="206" y="187" font-size="10" fill="#666">5,292</text>

  <!-- DR 3 — 2.5% -->
  <text x="110" y="222" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 3</text>
  <text x="110" y="234" text-anchor="end" font-size="9" fill="#999">Severe</text>
  <rect x="120" y="210" width="13" height="28" rx="3" fill="#D32F2F" opacity="0.82"/>
  <text x="141" y="229" font-size="10" fill="#666" font-weight="600">2.5%</text>
  <text x="183" y="229" font-size="10" fill="#888">873</text>

  <!-- DR 4 — 2.0% -->
  <text x="110" y="264" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 4</text>
  <text x="110" y="276" text-anchor="end" font-size="9" fill="#999">PDR</text>
  <rect x="120" y="252" width="10" height="28" rx="3" fill="#6A1B9A" opacity="0.82"/>
  <text x="138" y="271" font-size="10" fill="#666" font-weight="600">2.0%</text>
  <text x="180" y="271" font-size="10" fill="#888">708</text>

  <!-- Annotation -->
  <text x="24" y="296" font-size="10" fill="#D32F2F" font-weight="600">Severe class imbalance: DR 3+4 = 4.5% combined — justifies Focal Loss (&#947;=2, &#945;=inverse-freq)</text>
</svg>
