<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <rect width="700" height="280" fill="white"/>

  <!-- Title -->
  <text x="24" y="32" font-size="16" font-weight="700" fill="#1a1a2e">ODIR-5K — DR Subset Class Distribution</text>
  <text x="24" y="50" font-size="11" fill="#999">n = 1,818 DR-positive eyes (keyword-extracted) · Canon + Zeiss · Domain shift (Exp 6)</text>

  <line x1="24" y1="62" x2="676" y2="62" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Note: ODIR-5K keyword extraction only captures DR-positive eyes, so DR 0 = 0 -->

  <!-- DR 1 — 30.2% -->
  <text x="110" y="96" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 1</text>
  <text x="110" y="108" text-anchor="end" font-size="9" fill="#999">Mild</text>
  <rect x="120" y="84" width="151" height="28" rx="3" fill="#F9A825" opacity="0.82"/>
  <text x="130" y="103" font-size="11" fill="#444" font-weight="600">30.2%</text>
  <text x="281" y="103" font-size="10" fill="#666">549</text>

  <!-- DR 2 — 58.1% -->
  <text x="110" y="138" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 2</text>
  <text x="110" y="150" text-anchor="end" font-size="9" fill="#999">Moderate</text>
  <rect x="120" y="126" width="291" height="28" rx="3" fill="#EF6C00" opacity="0.82"/>
  <text x="130" y="145" font-size="11" fill="white" font-weight="600">58.1%</text>
  <text x="421" y="145" font-size="10" fill="#666">1,056</text>

  <!-- DR 3 — 8.9% -->
  <text x="110" y="180" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 3</text>
  <text x="110" y="192" text-anchor="end" font-size="9" fill="#999">Severe</text>
  <rect x="120" y="168" width="45" height="28" rx="3" fill="#D32F2F" opacity="0.82"/>
  <text x="173" y="187" font-size="10" fill="#666" font-weight="600">8.9%</text>
  <text x="215" y="187" font-size="10" fill="#888">161</text>

  <!-- DR 4 — 2.9% -->
  <text x="110" y="222" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 4</text>
  <text x="110" y="234" text-anchor="end" font-size="9" fill="#999">PDR</text>
  <rect x="120" y="210" width="15" height="28" rx="3" fill="#6A1B9A" opacity="0.82"/>
  <text x="143" y="229" font-size="10" fill="#666" font-weight="600">2.9%</text>
  <text x="185" y="229" font-size="10" fill="#888">52</text>

  <!-- Annotation -->
  <rect x="24" y="248" width="652" height="24" rx="4" fill="#FAEEDA"/>
  <text x="32" y="264" font-size="10" fill="#633806" font-weight="500">DR 0 absent — keyword extraction only captures DR-positive eyes. DR 2 inflated (58%) due to conservative &#8220;unqualified DR&#8221;&#8594;grade 2 mapping.</text>
</svg>
