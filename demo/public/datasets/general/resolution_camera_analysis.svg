<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 820" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <rect width="960" height="820" fill="white"/>

  <!-- Title -->
  <text x="480" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">Image Resolution Analysis — Camera Identification</text>
  <text x="480" y="44" text-anchor="middle" font-size="11" fill="#999">Unique resolutions per dataset · resolution groups as camera proxy (EXIF unavailable)</text>

  <line x1="30" y1="56" x2="930" y2="56" stroke="#E0E0E0" stroke-width="1"/>

  <!-- ═══ SECTION: Single-camera datasets ═══ -->
  <text x="30" y="78" font-size="10" fill="#1D9E75" font-weight="700" letter-spacing="0.5">SINGLE-CAMERA DATASETS (confirmed)</text>

  <!-- IDRiD -->
  <text x="150" y="104" text-anchor="end" font-size="12" font-weight="600" fill="#1a1a2e">IDRiD</text>
  <text x="150" y="116" text-anchor="end" font-size="9" fill="#999">Kowa VX-10&#945;</text>
  <rect x="160" y="92" width="500" height="28" rx="3" fill="#1D9E75" opacity="0.75"/>
  <text x="410" y="111" text-anchor="middle" font-size="11" fill="white" font-weight="600">4288&#215;2848 — 516 images (100%)</text>
  <text x="670" y="111" font-size="9" fill="#1D9E75" font-weight="600">1 resolution</text>

  <!-- EyePACS -->
  <text x="150" y="144" text-anchor="end" font-size="12" font-weight="600" fill="#1a1a2e">EyePACS</text>
  <text x="150" y="156" text-anchor="end" font-size="9" fill="#999">Canon CR-1</text>
  <rect x="160" y="132" width="149" height="12" rx="2" fill="#378ADD" opacity="0.8"/>
  <text x="316" y="142" font-size="8" fill="#666">3888&#215;2592 (30%)</text>
  <rect x="160" y="145" width="83" height="12" rx="2" fill="#378ADD" opacity="0.65"/>
  <text x="250" y="155" font-size="8" fill="#666">4752&#215;3168 (17%)</text>
  <rect x="250" y="145" width="63" height="12" rx="2" fill="#378ADD" opacity="0.5"/>
  <text x="320" y="155" font-size="8" fill="#666">2560&#215;1920 (13%)</text>
  <rect x="320" y="145" width="58" height="12" rx="2" fill="#378ADD" opacity="0.4"/>
  <rect x="385" y="145" width="53" height="12" rx="2" fill="#378ADD" opacity="0.3"/>
  <rect x="445" y="145" width="70" height="12" rx="2" fill="#378ADD" opacity="0.2"/>
  <text x="670" y="151" font-size="9" fill="#378ADD" font-weight="600">22 resolutions — same camera, multiple modes</text>

  <!-- Messidor-2 -->
  <text x="150" y="184" text-anchor="end" font-size="12" font-weight="600" fill="#1a1a2e">Messidor-2</text>
  <text x="150" y="196" text-anchor="end" font-size="9" fill="#999">Topcon TRC NW6</text>
  <rect x="160" y="172" width="176" height="24" rx="3" fill="#7F77DD" opacity="0.7"/>
  <text x="248" y="189" text-anchor="middle" font-size="9" fill="white" font-weight="500">2240&#215;1488 (616)</text>
  <rect x="340" y="172" width="173" height="24" rx="3" fill="#7F77DD" opacity="0.55"/>
  <text x="426" y="189" text-anchor="middle" font-size="9" fill="white" font-weight="500">2304&#215;1536 (604)</text>
  <rect x="517" y="172" width="151" height="24" rx="3" fill="#7F77DD" opacity="0.4"/>
  <text x="592" y="189" text-anchor="middle" font-size="9" fill="white" font-weight="500">1440&#215;960 (528)</text>
  <text x="680" y="189" font-size="9" fill="#7F77DD" font-weight="600">3 centres</text>

  <line x1="30" y1="212" x2="930" y2="212" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ═══ SECTION: Multi-camera datasets ═══ -->
  <text x="30" y="234" font-size="10" fill="#D85A30" font-weight="700" letter-spacing="0.5">MULTI-CAMERA DATASETS (resolution-inferred)</text>

  <!-- RFMiD — clearly separable -->
  <text x="150" y="262" text-anchor="end" font-size="12" font-weight="600" fill="#1a1a2e">RFMiD</text>
  <text x="150" y="274" text-anchor="end" font-size="9" fill="#999">Topcon + Kowa</text>
  <rect x="160" y="250" width="379" height="28" rx="3" fill="#D85A30" opacity="0.7"/>
  <text x="349" y="269" text-anchor="middle" font-size="10" fill="white" font-weight="600">2144&#215;1424 — 2,427 (75.8%) Topcon</text>
  <rect x="543" y="250" width="78" height="28" rx="3" fill="#1D9E75" opacity="0.7"/>
  <text x="582" y="269" text-anchor="middle" font-size="9" fill="white" font-weight="500">497</text>
  <rect x="625" y="250" width="43" height="28" rx="3" fill="#D85A30" opacity="0.45"/>
  <text x="646" y="269" text-anchor="middle" font-size="9" fill="white" font-weight="500">276</text>
  <text x="680" y="269" font-size="9" fill="#085041" font-weight="600">&#8592; 4288&#215;2848 = Kowa</text>
  <text x="680" y="281" font-size="8" fill="#085041">(matches IDRiD exactly)</text>

  <!-- Summary box for RFMiD -->
  <rect x="160" y="286" width="508" height="20" rx="3" fill="#E1F5EE"/>
  <text x="168" y="300" font-size="9" fill="#085041" font-weight="600">RFMiD camera split: Topcon &#8776; 2,703 images (84.5%) · Kowa &#8776; 497 images (15.5%)</text>

  <!-- DDR — heavily mixed -->
  <text x="150" y="332" text-anchor="end" font-size="12" font-weight="600" fill="#1a1a2e">DDR</text>
  <text x="150" y="344" text-anchor="end" font-size="9" fill="#999">Canon + Topcon</text>
  <!-- Many small bars to represent 132 resolutions -->
  <rect x="160" y="320" width="83" height="24" rx="2" fill="#D85A30" opacity="0.8"/>
  <text x="201" y="337" text-anchor="middle" font-size="8" fill="white">2592&#215;1728</text>
  <rect x="247" y="320" width="80" height="24" rx="2" fill="#D85A30" opacity="0.7"/>
  <text x="287" y="337" text-anchor="middle" font-size="8" fill="white">2736&#215;1824</text>
  <rect x="331" y="320" width="61" height="24" rx="2" fill="#D85A30" opacity="0.6"/>
  <text x="361" y="337" text-anchor="middle" font-size="8" fill="white">2048&#215;1536</text>
  <rect x="396" y="320" width="41" height="24" rx="2" fill="#D85A30" opacity="0.5"/>
  <rect x="441" y="320" width="25" height="24" rx="2" fill="#378ADD" opacity="0.6"/>
  <text x="453" y="337" text-anchor="middle" font-size="7" fill="white">CR-1</text>
  <rect x="470" y="320" width="23" height="24" rx="2" fill="#D85A30" opacity="0.4"/>
  <rect x="497" y="320" width="20" height="24" rx="2" fill="#D85A30" opacity="0.35"/>
  <rect x="521" y="320" width="18" height="24" rx="2" fill="#D85A30" opacity="0.3"/>
  <rect x="543" y="320" width="16" height="24" rx="2" fill="#D85A30" opacity="0.25"/>
  <rect x="563" y="320" width="14" height="24" rx="2" fill="#D85A30" opacity="0.2"/>
  <rect x="581" y="320" width="40" height="24" rx="2" fill="#888" opacity="0.15"/>
  <text x="601" y="337" text-anchor="middle" font-size="7" fill="#888">+122</text>
  <text x="640" y="337" font-size="9" fill="#D85A30" font-weight="600">132 unique resolutions</text>
  <text x="640" y="349" font-size="8" fill="#888">3888&#215;2592 (677 imgs) matches Canon CR-1</text>

  <!-- ODIR-5K — heavily mixed -->
  <text x="150" y="382" text-anchor="end" font-size="12" font-weight="600" fill="#1a1a2e">ODIR-5K</text>
  <text x="150" y="394" text-anchor="end" font-size="9" fill="#999">Canon + Zeiss</text>
  <rect x="160" y="370" width="154" height="24" rx="2" fill="#D85A30" opacity="0.8"/>
  <text x="237" y="387" text-anchor="middle" font-size="8" fill="white">2592&#215;1728 (2,146)</text>
  <rect x="318" y="370" width="38" height="24" rx="2" fill="#D85A30" opacity="0.6"/>
  <rect x="360" y="370" width="31" height="24" rx="2" fill="#D85A30" opacity="0.5"/>
  <rect x="395" y="370" width="28" height="24" rx="2" fill="#EF9F27" opacity="0.7"/>
  <text x="409" y="387" text-anchor="middle" font-size="7" fill="white">sq</text>
  <rect x="427" y="370" width="25" height="24" rx="2" fill="#D85A30" opacity="0.4"/>
  <rect x="456" y="370" width="20" height="24" rx="2" fill="#D85A30" opacity="0.35"/>
  <rect x="480" y="370" width="19" height="24" rx="2" fill="#EF9F27" opacity="0.5"/>
  <rect x="503" y="370" width="18" height="24" rx="2" fill="#D85A30" opacity="0.25"/>
  <rect x="525" y="370" width="15" height="24" rx="2" fill="#D85A30" opacity="0.2"/>
  <rect x="544" y="370" width="14" height="24" rx="2" fill="#D85A30" opacity="0.15"/>
  <rect x="562" y="370" width="40" height="24" rx="2" fill="#888" opacity="0.12"/>
  <text x="582" y="387" text-anchor="middle" font-size="7" fill="#888">+91</text>
  <text x="640" y="387" font-size="9" fill="#D85A30" font-weight="600">101 unique resolutions</text>
  <text x="640" y="399" font-size="8" fill="#EF9F27">Square formats (1444&#215;1444 etc.) likely Zeiss</text>

  <!-- APTOS -->
  <text x="150" y="432" text-anchor="end" font-size="12" font-weight="600" fill="#1a1a2e">APTOS 2019</text>
  <text x="150" y="444" text-anchor="end" font-size="9" fill="#999">Various</text>
  <rect x="160" y="420" width="133" height="24" rx="2" fill="#888" opacity="0.7"/>
  <text x="226" y="437" text-anchor="middle" font-size="8" fill="white">1050&#215;1050 (974)</text>
  <rect x="297" y="420" width="87" height="24" rx="2" fill="#888" opacity="0.55"/>
  <text x="340" y="437" text-anchor="middle" font-size="8" fill="white">2416&#215;1736</text>
  <rect x="388" y="420" width="73" height="24" rx="2" fill="#888" opacity="0.45"/>
  <text x="424" y="437" text-anchor="middle" font-size="8" fill="white">2588&#215;1958</text>
  <rect x="465" y="420" width="56" height="24" rx="2" fill="#888" opacity="0.35"/>
  <rect x="525" y="420" width="48" height="24" rx="2" fill="#888" opacity="0.25"/>
  <rect x="577" y="420" width="40" height="24" rx="2" fill="#888" opacity="0.15"/>
  <text x="640" y="437" font-size="9" fill="#888" font-weight="600">17 resolutions, cameras unknown</text>
  <text x="640" y="449" font-size="8" fill="#888">1050&#215;1050 = square crop (27%), 819&#215;614 = low-res (8%)</text>

  <!-- Clinical -->
  <text x="150" y="482" text-anchor="end" font-size="12" font-weight="600" fill="#1a1a2e">Clinical (KZ)</text>
  <text x="150" y="494" text-anchor="end" font-size="9" fill="#999">Topcon-type</text>
  <rect x="160" y="470" width="192" height="24" rx="3" fill="#7F77DD" opacity="0.6"/>
  <text x="256" y="487" text-anchor="middle" font-size="9" fill="white" font-weight="500">2240&#215;1488 (23)</text>
  <rect x="356" y="470" width="175" height="24" rx="3" fill="#7F77DD" opacity="0.45"/>
  <text x="443" y="487" text-anchor="middle" font-size="9" fill="white" font-weight="500">2304&#215;1536 (21)</text>
  <rect x="535" y="470" width="133" height="24" rx="3" fill="#7F77DD" opacity="0.3"/>
  <text x="601" y="487" text-anchor="middle" font-size="9" fill="white" font-weight="500">1440&#215;960 (16)</text>
  <text x="680" y="487" font-size="9" fill="#7F77DD" font-weight="600">= Messidor-2 profile</text>

  <line x1="30" y1="510" x2="930" y2="510" stroke="#E0E0E0" stroke-width="1"/>

  <!-- ═══ KEY FINDINGS ═══ -->
  <text x="30" y="534" font-size="11" font-weight="700" fill="#1a1a2e">Key Findings</text>

  <!-- Finding 1: RFMiD Kowa identification -->
  <rect x="30" y="546" width="440" height="62" rx="6" fill="#E1F5EE"/>
  <text x="42" y="564" font-size="10" fill="#085041" font-weight="700">RFMiD Kowa identification via resolution matching</text>
  <text x="42" y="578" font-size="10" fill="#085041">4288&#215;2848 in RFMiD (497 imgs) matches IDRiD (516 imgs) exactly.</text>
  <text x="42" y="592" font-size="10" fill="#085041">Both datasets list Kowa camera. Inferred: 15.5% Kowa, 84.5% Topcon.</text>

  <!-- Finding 2: Clinical = Messidor-2 camera -->
  <rect x="490" y="546" width="440" height="62" rx="6" fill="#EEEDFE"/>
  <text x="502" y="564" font-size="10" fill="#3C3489" font-weight="700">Clinical dataset uses Messidor-2 camera type</text>
  <text x="502" y="578" font-size="10" fill="#3C3489">Identical 3-resolution profile: 2240&#215;1488, 2304&#215;1536, 1440&#215;960.</text>
  <text x="502" y="592" font-size="10" fill="#3C3489">Almaty clinic likely uses same Topcon TRC NW6 or equivalent model.</text>

  <!-- Finding 3: DDR Canon CR-1 overlap -->
  <rect x="30" y="618" width="440" height="48" rx="6" fill="#E6F1FB"/>
  <text x="42" y="636" font-size="10" fill="#0C447C" font-weight="700">DDR contains Canon CR-1 images from training domain</text>
  <text x="42" y="650" font-size="10" fill="#0C447C">677 DDR images at 3888&#215;2592 match EyePACS Canon CR-1 native resolution.</text>

  <!-- Finding 4: ODIR-5K Zeiss indicator -->
  <rect x="490" y="618" width="440" height="48" rx="6" fill="#FAEEDA"/>
  <text x="502" y="636" font-size="10" fill="#633806" font-weight="700">ODIR-5K square formats suggest Zeiss acquisition</text>
  <text x="502" y="650" font-size="10" fill="#633806">1444&#215;1444, 2976&#215;2976 etc. — square sensors typical of Zeiss devices.</text>

  <!-- ═══ RESOLUTION DIVERSITY SUMMARY ═══ -->
  <text x="30" y="690" font-size="11" font-weight="700" fill="#1a1a2e">Resolution Diversity Index</text>
  <text x="30" y="704" font-size="9" fill="#999">Unique resolutions per dataset — higher = more device heterogeneity = harder domain shift</text>

  <!-- Mini bar chart -->
  <text x="150" y="728" text-anchor="end" font-size="10" fill="#333">DDR</text>
  <rect x="160" y="718" width="396" height="14" rx="2" fill="#D85A30" opacity="0.7"/>
  <text x="564" y="730" font-size="9" fill="#666" font-weight="600">132</text>

  <text x="150" y="746" text-anchor="end" font-size="10" fill="#333">ODIR-5K</text>
  <rect x="160" y="736" width="303" height="14" rx="2" fill="#D85A30" opacity="0.6"/>
  <text x="471" y="748" font-size="9" fill="#666" font-weight="600">101</text>

  <text x="150" y="764" text-anchor="end" font-size="10" fill="#333">EyePACS</text>
  <rect x="160" y="754" width="66" height="14" rx="2" fill="#378ADD" opacity="0.6"/>
  <text x="234" y="766" font-size="9" fill="#666" font-weight="600">22</text>

  <text x="150" y="782" text-anchor="end" font-size="10" fill="#333">APTOS</text>
  <rect x="160" y="772" width="51" height="14" rx="2" fill="#888" opacity="0.5"/>
  <text x="219" y="784" font-size="9" fill="#666" font-weight="600">17</text>

  <text x="150" y="800" text-anchor="end" font-size="10" fill="#333">Mess-2 / RFMiD / Clin.</text>
  <rect x="160" y="790" width="9" height="14" rx="2" fill="#7F77DD" opacity="0.5"/>
  <text x="177" y="802" font-size="9" fill="#666" font-weight="600">3</text>

  <text x="150" y="818" text-anchor="end" font-size="10" fill="#333">IDRiD</text>
  <rect x="160" y="808" width="3" height="14" rx="2" fill="#1D9E75" opacity="0.7"/>
  <text x="171" y="820" font-size="9" fill="#666" font-weight="600">1</text>
</svg>
