<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <rect width="700" height="200" fill="white"/>

  <!-- Title -->
  <text x="24" y="32" font-size="16" font-weight="700" fill="#1a1a2e">RFMiD — DR Distribution (Binary)</text>
  <text x="24" y="50" font-size="11" fill="#999">n = 3,200 images · Topcon + Kowa · Domain shift (Exp 6) · Binary DR labels only</text>

  <line x1="24" y1="62" x2="676" y2="62" stroke="#E0E0E0" stroke-width="1"/>

  <!-- DR absent — 80.3% -->
  <text x="110" y="96" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR absent</text>
  <text x="110" y="108" text-anchor="end" font-size="9" fill="#999">Label = 0</text>
  <rect x="120" y="84" width="402" height="28" rx="3" fill="#2E7D32" opacity="0.82"/>
  <text x="130" y="103" font-size="11" fill="white" font-weight="600">80.3%</text>
  <text x="532" y="103" font-size="10" fill="#666">2,568</text>

  <!-- DR present — 19.8% -->
  <text x="110" y="138" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR present</text>
  <text x="110" y="150" text-anchor="end" font-size="9" fill="#999">Label = 1</text>
  <rect x="120" y="126" width="99" height="28" rx="3" fill="#D32F2F" opacity="0.82"/>
  <text x="130" y="145" font-size="11" fill="white" font-weight="600">19.8%</text>
  <text x="229" y="145" font-size="10" fill="#666">632</text>

  <!-- Annotation -->
  <rect x="24" y="168" width="652" height="24" rx="4" fill="#FAECE7"/>
  <text x="32" y="184" font-size="10" fill="#712B13" font-weight="500">Binary labels only — no 5-class severity grading available. Multi-disease dataset; DR is one of 28 annotated conditions.</text>
</svg>
