<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <rect width="700" height="300" fill="white"/>

  <!-- Title -->
  <text x="24" y="32" font-size="16" font-weight="700" fill="#1a1a2e">DDR — Class Distribution</text>
  <text x="24" y="50" font-size="11" fill="#999">n = 12,522 images (grade 5 excluded) · Canon + Topcon · Domain shift (Exp 6)</text>

  <line x1="24" y1="62" x2="676" y2="62" stroke="#E0E0E0" stroke-width="1"/>

  <!-- DR 0 — 50.0% -->
  <text x="110" y="96" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 0</text>
  <text x="110" y="108" text-anchor="end" font-size="9" fill="#999">No DR</text>
  <rect x="120" y="84" width="250" height="28" rx="3" fill="#2E7D32" opacity="0.82"/>
  <text x="130" y="103" font-size="11" fill="white" font-weight="600">50.0%</text>
  <text x="380" y="103" font-size="10" fill="#666">6,266</text>

  <!-- DR 1 — 5.0% -->
  <text x="110" y="138" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 1</text>
  <text x="110" y="150" text-anchor="end" font-size="9" fill="#999">Mild</text>
  <rect x="120" y="126" width="25" height="28" rx="3" fill="#F9A825" opacity="0.82"/>
  <text x="153" y="145" font-size="10" fill="#666" font-weight="600">5.0%</text>
  <text x="195" y="145" font-size="10" fill="#888">630</text>

  <!-- DR 2 — 35.8% -->
  <text x="110" y="180" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 2</text>
  <text x="110" y="192" text-anchor="end" font-size="9" fill="#999">Moderate</text>
  <rect x="120" y="168" width="179" height="28" rx="3" fill="#EF6C00" opacity="0.82"/>
  <text x="130" y="187" font-size="11" fill="white" font-weight="600">35.8%</text>
  <text x="309" y="187" font-size="10" fill="#666">4,477</text>

  <!-- DR 3 — 1.9% -->
  <text x="110" y="222" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 3</text>
  <text x="110" y="234" text-anchor="end" font-size="9" fill="#999">Severe</text>
  <rect x="120" y="210" width="10" height="28" rx="3" fill="#D32F2F" opacity="0.82"/>
  <text x="138" y="229" font-size="10" fill="#666" font-weight="600">1.9%</text>
  <text x="180" y="229" font-size="10" fill="#888">236</text>

  <!-- DR 4 — 7.3% -->
  <text x="110" y="264" text-anchor="end" font-size="11" fill="#1a1a2e" font-weight="600">DR 4</text>
  <text x="110" y="276" text-anchor="end" font-size="9" fill="#999">PDR</text>
  <rect x="120" y="252" width="37" height="28" rx="3" fill="#6A1B9A" opacity="0.82"/>
  <text x="165" y="271" font-size="10" fill="#666" font-weight="600">7.3%</text>
  <text x="207" y="271" font-size="10" fill="#888">913</text>

  <text x="24" y="296" font-size="10" fill="#D85A30" font-weight="600">1,151 grade-5 (ungradable) images excluded. DR 3 rarest class (1.9%) — Chinese multi-centre collection.</text>
</svg>
