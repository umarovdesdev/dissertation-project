# Smoke test config — 1% EyePACS subset for Config D validation
seed: 42
deterministic: true
pipeline_version: v4
subset:
  enabled: true
  fraction: 0.01
  seed: 42
paths:
  eyepacs: /mnt/d/datasets/EyePACS
  idrid: /mnt/d/datasets/IDRiD
  messidor: /mnt/d/datasets/Messidor
  messidor2: /mnt/d/datasets/Messidor-2
  rfmid: /mnt/d/datasets/RFMiD/A. RFMiD_All_Classes_Dataset
  ddr: /mnt/d/datasets/DDR
  odir: /mnt/d/datasets/ODIR-5K
  output_dir: outputs/
preprocessing_v4:
  use_canonical_flip: true
  use_flat_field: true
  use_clahe: true
  use_pca_color: true
  use_brightness_contrast: true
  use_shear: true
  use_stretch: true
  target_size: 512
  flat_field_sigma: 45.0
  clahe_tile_grid_size:
  - 8
  - 8
  clahe_clip_factor: 2.0
  clahe_global_threshold: 0.01
  clahe_train_prob: 0.8
  rotation_sigma: 13.0
  rotation_clip: 40.0
  zoom_range:
  - 0.9
  - 1.1
  stretch_range:
  - 0.952381
  - 1.05
  shear_range:
  - -2.0
  - 2.0
  shear_prob: 0.3
  interp_weights:
  - 0.6
  - 0.3
  - 0.1
  border_mode: 4
  pca_color_sigma: 0.1
  pca_color_prob: 0.5
  brightness_alpha_range:
  - 0.9
  - 1.1
  brightness_beta_range:
  - -10.0
  - 10.0
  bc_prob: 0.5
  normalize_mean:
  - 0.485
  - 0.456
  - 0.406
  normalize_std:
  - 0.229
  - 0.224
  - 0.225
preprocessing:
  fov_standardization: true
  green_channel: true
  normalization: true
  clahe: true
  hsv_enhancement: true
  target_size: 512
augmentation:
  horizontal_flip: true
  vertical_flip: true
  rotation_degrees: 15
  zoom_range: 0.1
  brightness_range:
  - 0.9
  - 1.1
cross_validation:
  n_folds: 3
  patient_level_split: true
  stratified: true
models:
  resnet50:
    pretrained: true
    num_classes: 5
    dropout: 0.4
  efficientnet_b0:
    pretrained: true
    num_classes: 5
    dropout: 0.4
  efficientnet_b3:
    pretrained: true
    num_classes: 5
    dropout: 0.4
  efficientnet_b4:
    pretrained: true
    num_classes: 5
    dropout: 0.4
training:
  optimizer: adam
  learning_rate: 0.0001
  weight_decay: 0.0001
  batch_size: 16
  max_epochs: 20
  mixed_precision: true
  num_workers: 4
  class_weights: inverse_frequency
  early_stopping:
    patience: 5
    monitor: val_weighted_f1
    mode: max
  scheduler:
    type: reduce_on_plateau
    factor: 0.5
    patience: 3
    min_lr: 1.0e-06
evaluation:
  primary_metrics:
  - weighted_f1
  - roc_auc
  - cohen_kappa
  - accuracy
  dominance_thresholds:
    f1_delta: 0.05
    auc_delta: 0.02
    kappa_no_degradation: true
  bootstrap_iterations: 1000
  confidence_level: 0.95
experiments:
  exp1:
    name: 'V3 Experiment 1: 2x2 Factorial (Preprocessing vs Architecture)'
    hypothesis: H-1
    dataset: eyepacs
    configurations:
      A:
        preprocessing: baseline
        model: resnet50
      B:
        preprocessing: full
        model: resnet50
      C:
        preprocessing: baseline
        model: efficientnet_b3
      D:
        preprocessing: full
        model: efficientnet_b3
