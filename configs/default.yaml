seed: 42
deterministic: true

paths:
  eyepacs:       /mnt/d/datasets/EyePACS
  aptos:         /mnt/d/datasets/APTOS 2019
  idrid:         /mnt/d/datasets/IDRiD
  messidor:      /mnt/d/datasets/Messidor
  messidor2:     /mnt/d/datasets/Messidor-2
  rfmid:         /mnt/d/datasets/RFMiD
  ddr:           /mnt/d/datasets/DDR
  odir:          /mnt/d/datasets/ODIR-5K
  output_dir:    outputs/

preprocessing:
  fov_standardization: true
  green_channel:       true
  normalization:       true
  clahe:               true
  hsv_enhancement:     true
  target_size:         512
  clahe:
    enabled:     true
    clip_limit:  2.0      # dynamic; T/80 reference from LC-AlTimemy-2021
    tile_grid_size: [8, 8]
  hsv:
    enabled:          true
    saturation_scale: 1.2
    value_scale:      1.1

augmentation:
  horizontal_flip: true
  vertical_flip:   true
  rotation_degrees: 15
  zoom_range:       0.10   # ±10%
  brightness_range: [0.9, 1.1]

cross_validation:
  n_folds:              5
  patient_level_split:  true
  stratified:           true

models:
  resnet50:
    pretrained:   true
    num_classes:  5
    dropout:      0.4
  efficientnet_b0:
    pretrained:   true
    num_classes:  5
    dropout:      0.4
  efficientnet_b3:
    pretrained:   true
    num_classes:  5
    dropout:      0.4
  efficientnet_b4:
    pretrained:   true
    num_classes:  5
    dropout:      0.4

training:
  optimizer:          adam
  learning_rate:      0.0001
  weight_decay:       0.0001
  batch_size:         16
  max_epochs:         100
  mixed_precision:    true
  num_workers:        4
  class_weights:      inverse_frequency
  early_stopping:
    patience:         10
    monitor:          val_weighted_f1
    mode:             max
  scheduler:
    type:             reduce_on_plateau
    factor:           0.5
    patience:         5
    min_lr:           1.0e-6
  two_stage:
    stage1_epochs:    30
    stage1_lr:        0.001
    stage2_epochs:    70
    stage2_lr:        0.0001

evaluation:
  primary_metrics:
    - weighted_f1
    - roc_auc
    - cohen_kappa
    - accuracy
  dominance_thresholds:
    f1_delta:         0.05    # >= 5 percentage points
    auc_delta:        0.02    # >= 0.02
    kappa_no_degradation: true
  bootstrap_iterations: 1000
  confidence_level:   0.95

experiments:
  exp1:
    name:       "Experiment 1: 2x2 Factorial (Preprocessing vs Architecture)"
    hypothesis: H-1
    dataset:    eyepacs
    configurations:
      A: {preprocessing: baseline, model: resnet50}
      B: {preprocessing: full,     model: resnet50}
      C: {preprocessing: baseline, model: efficientnet_b3}
      D: {preprocessing: full,     model: efficientnet_b3}

  exp2:
    name:       "Experiment 2: Preprocessing Component Ablation"
    hypothesis: H-2
    dataset:    eyepacs
    configurations:
      - components: [fov_standardization]
      - components: [fov_standardization, normalization]
      - components: [fov_standardization, clahe]
      - components: [fov_standardization, normalization, clahe]
      - components: [fov_standardization, green_channel, normalization, clahe, hsv_enhancement]

  exp3:
    name:       "Experiment 3: Robustness to Image Degradation"
    hypothesis: H-3
    dataset:    aptos
    perturbations:
      - type: gaussian_noise
        levels: [low, medium, high]
      - type: gaussian_blur
        levels: [low, medium, high]
      - type: low_illumination
        levels: [low, medium, high]

  exp4:
    name:       "Experiment 4: Grad-CAM Explainability"
    hypothesis: H-5
    dataset:    idrid
    model:      efficientnet_b4
    samples_per_class: 10

  exp5:
    name:       "Experiment 5: Clinical Generalization"
    hypothesis: H-4
    train_dataset: eyepacs
    test_datasets: [messidor, messidor2, idrid]

  exp6:
    name:       "Experiment 6: Device Domain Shift"
    hypothesis: H-6
    train_dataset: eyepacs
    test_datasets: [rfmid, ddr, odir, idrid, messidor]
