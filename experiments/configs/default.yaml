seed: 42
deterministic: true

subset:
  enabled:    false       # 100% EyePACS
  fraction:   1.0
  seed:       42

paths:
  eyepacs:       "E:/datasets/EyePACS"
  aptos:         "E:/datasets/APTOS 2019"
  idrid:         "E:/datasets/IDRiD"
  messidor2:     "E:/datasets/Messidor-2"
  rfmid:         "E:/datasets/RFMiD"
  ddr:           "E:/datasets/DDR"
  odir:          "E:/datasets/ODIR-5K"
  clinical:      "E:/datasets/clinical"
  output_dir:    outputs/

preprocessing:
  # --- Stage 0: Canonical Flip ---
  use_canonical_flip: true

  # --- Stage 1: OD-Fovea Rotation ---
  use_od_fovea_rotation: true
  od_blur_sigma: 15.0
  od_percentile: 97.0
  fovea_blur_sigma: 25.0
  fovea_inner_factor: 1.5
  fovea_outer_factor: 3.5
  adaptive_rotation_sigma: true
  fallback_rotation_sigma: 13.0

  # --- Stage 2: FOV Crop + Isotropic Resize ---
  target_size: 512

  # --- Stage 3: FOV Mask Generation ---
  # Implicit — mask generated during isotropic resize (crop_resize module)

  # --- Stage 4: Flat-Field Correction ---
  flat_field_mode: adaptive               # "adaptive" (σ=factor·D) or "fixed" (σ=flat_field_sigma)
  flat_field_sigma_factor: 0.07           # σ = 0.07 × FOV diameter D
  flat_field_sigma: 45.0                  # fallback if mode=fixed or D unavailable
  flat_field_mask_only: true              # apply correction only inside FOV mask

  # --- Stage 5: CLAHE ---
  clahe_mode: polar                       # "polar" (adaptive polar, thesis-faithful) or "tiles" (8×8)
  clahe_tile_grid_size: [8, 8]            # "tiles" mode only
  clahe_clip_factor: 2.0
  clahe_global_threshold: 0.01
  clahe_train_prob: 0.8
  # Polar-CLAHE geometry ("polar" mode only)
  clahe_radial_rings: 8
  clahe_radial_exponent: 1.5
  clahe_fine_bins: 72
  clahe_min_sector_area_frac: 0.01

  # --- Stage 6: Augmentation (train only) ---
  rotation_sigma: 13.0
  rotation_clip: 40.0
  zoom_range: [0.9, 1.1]
  stretch_range: [0.952381, 1.05]         # [1/1.05, 1.05]
  shear_range: [-2.0, 2.0]
  shear_prob: 0.3
  interp_weights: [0.6, 0.3, 0.1]        # LINEAR, CUBIC, NEAREST
  border_mode: 4                          # cv2.BORDER_REFLECT
  # ColorJitter (brightness/contrast/saturation/hue), per-component prob
  color_jitter_brightness_range: [0.9, 1.1]
  color_jitter_contrast_range: [0.9, 1.1]
  color_jitter_saturation_range: [0.9, 1.1]
  color_jitter_hue_range: [-0.02, 0.02]
  color_jitter_prob: 0.5
  # Acquisition-variability augmentations
  gaussian_noise_sigma_range: [2.0, 6.0]  # 8-bit RGB scale
  gaussian_noise_prob: 0.15
  jpeg_quality_range: [70, 100]
  jpeg_prob: 0.2
  use_color_jitter: true
  use_gaussian_noise: true
  use_jpeg_compression: true
  use_shear: true
  use_stretch: true

  # --- Stage 7: Dataset-Specific Normalize ---
  normalize_mode: dataset_specific        # "dataset_specific" or "imagenet"
  # Dataset-specific stats computed from EyePACS train set (mask=1.0 pixels only)
  # Will be populated by compute_dataset_stats.py script
  dataset_mean: null                      # placeholder — compute before first run
  dataset_std: null                       # placeholder — compute before first run
  # ImageNet fallback (used for baseline configs)
  imagenet_mean: [0.485, 0.456, 0.406]
  imagenet_std: [0.229, 0.224, 0.225]

cross_validation:
  n_folds:              5
  patient_level_split:  true
  stratified:           true

models:
  resnet50:
    pretrained:      true
    num_classes:     5
    dropout:         0.4
    mixed_precision: true
    # in_channels set per-experiment: 3 (baseline) or 4 (full pipeline)
  efficientnet_b3:
    pretrained:      true
    num_classes:     5
    dropout:         0.4
    mixed_precision: false   # fp16 overflow — must stay disabled
  efficientnet_b4:
    pretrained:      true
    num_classes:     5
    dropout:         0.4
    mixed_precision: false   # fp16 overflow — must stay disabled

training:
  optimizer:          adam
  learning_rate:      0.0001
  weight_decay:       0.0001
  batch_size:         16
  max_epochs:         20
  mixed_precision:    true   # DEPRECATED — per-model setting in models.*.mixed_precision is authoritative
  num_workers:        4
  class_weights:      inverse_frequency
  loss_type:          focal               # Focal Loss only
  focal_gamma:        2.0
  early_stopping:
    patience:         5
    monitor:          val_weighted_f1
    mode:             max
  scheduler:
    type:             reduce_on_plateau
    factor:           0.5
    patience:         3
    min_lr:           1.0e-6

evaluation:
  primary_metrics:
    - weighted_f1
    - roc_auc
    - cohen_kappa
    - accuracy
  dominance_thresholds:
    f1_delta:         0.05
    auc_delta:        0.02
    kappa_no_degradation: true
  bootstrap_iterations: 1000
  confidence_level:   0.95

# ---------------------------------------------------------------------------
# Self-supervised pretraining (SSL) for the pipeline arm (Configs B/D).
# Records supporting contribution SC-H; bounded by CFC-2.8. Label-free
# pretraining on the EyePACS original "test" split (53,576 images), disjoint
# from Exp-1's train/ corpus (INV-SSL-2). See docs/fundus_ssl_pretraining_brief.md.
# ---------------------------------------------------------------------------
ssl:
  method:            byol            # byol | mocov2 | simsiam | dino
  image_size:        256             # Stage-2 target for the SSL base tensor (downstream = 512)
  in_channels:       4               # RGB + FOV mask
  cache_dir:         null            # Stage 0–4 cache dir (from scripts/precompute_ssl_cache.py).
                                     # When set + present, the SSL dataset reads cached PNGs and runs
                                     # only Stage 5 + two-view aug (throughput fix). null = live pipeline.
  epochs:            300             # full run; watch the gate, not a fixed number
  screening_epochs:  100             # short per-method screening (§5.3)
  batch_size:        32              # start 32 @ 256²; drop to 16 on OOM, raise to 48 with headroom
  num_workers:       4
  seed:              42
  deterministic:     true
  grad_clip:         1.0

  corpus:
    eyepacs_test_dir:   "test"               # joined onto paths.eyepacs
    test_labels_csv:    "testLabels15.csv"   # probe only; joined onto paths.eyepacs
    train_labels_csv:   "trainLabels.csv"    # Exp-1 corpus, for the disjointness assertion
    image_glob:         "*.jpeg"
    expected_count:     53576

  optimizer:
    name:            lars            # lars | sgd | adamw
    base_lr:         0.45            # ≈ 0.2 × batch_size/256 (recompute per batch size)
    weight_decay:    1.0e-6
    warmup_epochs:   10
    schedule:        cosine

  byol:
    proj_hidden:     4096
    proj_out:        256
    pred_hidden:     4096
    ema_base:        0.996           # ramps 0.996 → 1.0 on a cosine schedule

  mocov2:  { queue_size: 8192, moco_dim: 128, temperature: 0.2, ema: 0.999 }
  simsiam: { proj_hidden: 2048, proj_out: 2048, pred_hidden: 512 }
  dino:    { out_dim: 65536, n_local_crops: 6, student_temp: 0.1, teacher_temp: 0.07, center_momentum: 0.9 }

  augment:
    global_crop_scale:   [0.2, 1.0]
    local_crop_scale:    [0.05, 0.2]   # dino only (multi-crop not wired — see methods.py DINO note)
    color_jitter:        [0.4, 0.4, 0.2, 0.1]
    color_jitter_prob:   0.8
    grayscale_prob:      0.2
    blur_prob_view1:     1.0
    blur_prob_view2:     0.1
    solarize_prob_view2: 0.2
    hflip_prob:          0.5
    # NOTE: all photometric entries above apply to RGB channels ONLY (§4.3)

  backbones:          [resnet50, efficientnet_b3]   # pretrain each separately

  mixed_precision:
    resnet50:         true
    efficientnet_b3:  false          # fp16 overflow — must stay disabled (CLAUDE.md)

  checkpoint:
    out_dir:          "outputs/ssl"   # versioned subdirs (e.g. v1.0) appended at save time
    version:          "v1.0"
    save_every:       50
    keep_last:        2
    resume_every:     1               # rolling train_state.pt cadence (epochs) for --resume

  probe:                              # linear-probe acceptance gate (§8)
    enabled:          true
    image_size:       256
    epochs:           50
    batch_size:       64
    lr:               0.1
    label_csv:        "testLabels15.csv"
    holdout_usage:    "Private"        # probe-test slice by the Usage column
    knn_k:            20
    accept_vs_random_kappa_delta:    0.05    # κ(SSL) − κ(random) ≥ 0.05
    accept_vs_imagenet_kappa_margin: -0.03   # κ(SSL) ≥ κ(ImageNet) − 0.03

experiments:
  exp1:
    name:       "Experiment 1: Preprocessing Dominance (2x2 Factorial)"
    hypothesis: H-1
    dataset:    eyepacs
    # init.source wires CFC-2.8: baseline arm (A/C) ⟹ ImageNet;
    # pipeline arm (B/D) ⟹ fundus-only SSL (gated checkpoint, brief §10).
    # B/D refuse to start until their SSL checkpoint exists with meta.gate_passed=true.
    configurations:
      A: {preprocessing: baseline, model: resnet50,        in_channels: 3, init: {source: imagenet}}
      B: {preprocessing: full,  model: resnet50,        in_channels: 4, init: {source: ssl, ckpt: "outputs/ssl/v1.0/ssl_byol_resnet50_4ch_256_ep300.pt"}}
      C: {preprocessing: baseline, model: efficientnet_b3, in_channels: 3, init: {source: imagenet}}
      D: {preprocessing: full,  model: efficientnet_b3, in_channels: 4, init: {source: ssl, ckpt: "outputs/ssl/v1.0/ssl_byol_efficientnet_b3_4ch_256_ep300.pt"}}

  exp2:
    name:       "Experiment 2: Component Ablation + Parameter Sweeps"
    hypothesis: H-2
    dataset:    eyepacs
    ablation_stages:
      - {name: "baseline",           stages: [stretch_resize, imagenet_norm],                                       channels: 3}
      - {name: "+canonical_flip",    stages: [canonical_flip, stretch_resize, imagenet_norm],                        channels: 3}
      - {name: "+od_fovea_rotation", stages: [canonical_flip, od_fovea, stretch_resize, imagenet_norm],              channels: 3}
      - {name: "+isotropic+mask",    stages: [canonical_flip, od_fovea, isotropic_resize, fov_mask, imagenet_norm],  channels: 4}
      - {name: "+flat_field",        stages: [canonical_flip, od_fovea, isotropic_resize, fov_mask, flat_field, imagenet_norm], channels: 4}
      - {name: "+clahe",             stages: [canonical_flip, od_fovea, isotropic_resize, fov_mask, flat_field, clahe, imagenet_norm], channels: 4}
      - {name: "full",            stages: all, channels: 4}
    clahe_sweep:
      dataset:    eyepacs
      clip_limits: [0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 4.0]
    flat_field_sweep:
      dataset:    eyepacs
      sigma_factors: [0.05, 0.06, 0.07, 0.08, 0.09, 0.10]

  exp3:
    name:       "Experiment 3: Cross-Dataset Transferability"
    hypothesis: H-4
    train_dataset: eyepacs
    test_datasets: [aptos]
    generalization_threshold: 0.85

  exp4:
    name:       "Experiment 4: Explainability (Grad-CAM)"
    hypothesis: H-5
    train_dataset: eyepacs
    test_datasets:
      quantitative: idrid
      qualitative:  clinical
    model:      efficientnet_b4
    samples_per_class: 10

  exp5:
    name:       "Experiment 5: Clinical Degradation Resistance"
    hypothesis: H-7
    train_dataset: eyepacs
    test_datasets: [idrid, messidor2]
    metric:     delta_f1

  exp6:
    name:       "Experiment 6: Device Domain Shift"
    hypothesis: H-6
    train_dataset: eyepacs
    test_datasets: [ddr, odir, rfmid]
    dr_labels_only: true

  exp7:
    name:       "Experiment 7: Small Data Training"
    train_dataset: idrid
    test_dataset:  clinical
    cross_validation: 5
