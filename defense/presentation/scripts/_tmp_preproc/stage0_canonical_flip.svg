<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 488 588" width="488" height="588">
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#000000"/>
    </marker>
    <style>
      .doc-ttl    { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 700; fill: #111827; font-size: 22px; }
      .doc-sub    { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 400; fill: #4b5563; font-size: 13px; }
      .pnl-ttl    { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 700; fill: #111827; font-size: 17px; }
      .pnl-mode   { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 600; fill: #ffffff; font-size: 11px; letter-spacing: 0.6px; }
      .sec-hdr    { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 700; fill: #6b7280; font-size: 11px; letter-spacing: 1.4px; }
      .body       { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 400; fill: #111827; font-size: 13px; }
      .body-em    { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 600; fill: #111827; font-size: 13px; }
      .mono       { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-weight: 500; fill: #111827; font-size: 12.5px; }
      .mono-dim   { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-weight: 400; fill: #374151; font-size: 12px; }
      .arrow-num  { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 700; fill: #6b7280; font-size: 13px; }
      .legend-txt { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 400; fill: #374151; font-size: 12px; }
      .edge       { fill: none; stroke: #6b7280; stroke-width: 1.6; }
    </style>
  </defs>
  <rect width="488" height="588" fill="#ffffff"/>
  <g transform="translate(24, 24)">
    <rect width="440" height="500" rx="6" fill="#0d9488" fill-opacity="0.07" stroke="#0d9488" stroke-width="2"/>
    <!-- Title bar -->
    <text x="20" y="32" class="pnl-ttl">Stage 0 — Canonical Flip</text>
    <rect x="302" y="14" width="120" height="22" rx="3" fill="#0d9488"/>
    <text x="362" y="29" text-anchor="middle" class="pnl-mode">LEFT EYE ONLY</text>
    <line x1="20" y1="50" x2="420" y2="50" stroke="#0d9488" stroke-width="1" stroke-opacity="0.4"/>

    <!-- Input -->
    <text x="20" y="76" class="sec-hdr">INPUT</text>
    <text x="20" y="98" class="mono">RGB uint8  ·  H × W × 3</text>
    <text x="20" y="118" class="body">+ eye laterality  s ∈ {left, right, unknown}</text>

    <!-- Operations -->
    <text x="20" y="158" class="sec-hdr">OPERATIONS</text>
    <text x="20" y="182" class="body">1.  Read laterality s from metadata</text>
    <text x="20" y="204" class="body">2.  If s = “left”  →  horizontal mirror flip</text>
    <text x="20" y="226" class="body">3.  If s = “right” / unknown  →  pass-through</text>
    <text x="20" y="252" class="body-em">Purpose:  unify orientation so the optic disc</text>
    <text x="20" y="270" class="body-em">always lies on the right (right-eye convention)</text>

    <!-- Parameters -->
    <text x="20" y="320" class="sec-hdr">PARAMETERS</text>
    <text x="20" y="342" class="body">— (no tunable parameters)</text>

    <!-- Output -->
    <text x="20" y="402" class="sec-hdr">OUTPUT</text>
    <text x="20" y="424" class="mono">RGB uint8  ·  H × W × 3</text>
    <text x="20" y="444" class="body">right-eye orientation</text>
  </g>
</svg>
