  <text x="210" y="128" text-anchor="end" font-size="12" font-weight="600" fill="#1a1a2e">EyePACS</text>
  <text x="210" y="141" text-anchor="end" font-size="9" fill="#999">n = 35 126</text>
  <rect x="220" y="116" width="367.5" height="30" fill="#2E7D32"/>
  <text x="403.75" y="136" text-anchor="middle" font-size="10" fill="white" font-weight="600">74%</text>
  <rect x="587.5" y="116" width="34.5" height="30" fill="#F9A825"/>
  <text x="604.75" y="136" text-anchor="middle" font-size="10" fill="#444" font-weight="600">7%</text>
  <rect x="622.0" y="116" width="75.5" height="30" fill="#EF6C00"/>
