  <rect x="710.0" y="166" width="10.0" height="30" fill="#6A1B9A"/>
  <text x="760" y="184" font-size="9" fill="#aaa" font-style="italic">Topcon TRC NW6</text>

  <text x="210" y="228" text-anchor="end" font-size="12" font-weight="600" fill="#1a1a2e">DDR</text>
  <text x="210" y="241" text-anchor="end" font-size="9" fill="#999">n = 12 522</text>
  <rect x="220" y="216" width="250.0" height="30" fill="#2E7D32"/>
