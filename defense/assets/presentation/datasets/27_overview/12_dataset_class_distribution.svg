  <!-- Other-taxonomy section header -->
  <text x="24" y="438" font-size="9" fill="#999" font-weight="700" letter-spacing="0.5">КІЛТ СӨЗ / БИНАРЛЫ ЖІКТЕМЕ</text>

  <text x="210" y="450" text-anchor="end" font-size="12" font-weight="600" fill="#1a1a2e">ODIR-5K</text>
  <text x="210" y="463" text-anchor="end" font-size="9" fill="#999">n = 1 818 көз</text>
  <rect x="220" y="438" width="151.0" height="30" fill="#F9A825"/>
  <text x="295.5" y="458" text-anchor="middle" font-size="10" fill="#444" font-weight="600">30%</text>
  <rect x="371.0" y="438" width="290.5" height="30" fill="#EF6C00"/>
  <text x="516.25" y="458" text-anchor="middle" font-size="10" fill="white" font-weight="600">58%</text>
  <rect x="661.5" y="438" width="44.5" height="30" fill="#D32F2F"/>
  <text x="683.75" y="458" text-anchor="middle" font-size="10" fill="white" font-weight="600">9%</text>
  <rect x="706.0" y="438" width="14.5" height="30" fill="#6A1B9A"/>
  <text x="760" y="450" font-size="9" fill="#aaa" font-style="italic">Canon + Zeiss</text>
  <text x="760" y="462" font-size="8" fill="#D85A30">тек DR-positive</text>

  <text x="210" y="500" text-anchor="end" font-size="12" font-weight="600" fill="#1a1a2e">RFMiD</text>
  <text x="210" y="513" text-anchor="end" font-size="9" fill="#999">n = 3 200</text>
  <rect x="220" y="488" width="401.5" height="30" fill="#2E7D32"/>
  <text x="420.75" y="508" text-anchor="middle" font-size="10" fill="white" font-weight="600">80.3% жоқ</text>
  <rect x="621.5" y="488" width="99.0" height="30" fill="#D32F2F"/>
  <text x="671.0" y="508" text-anchor="middle" font-size="9" fill="white" font-weight="600">19.8% бар</text>
  <text x="760" y="500" font-size="9" fill="#aaa" font-style="italic">Topcon + Kowa</text>
  <text x="760" y="512" font-size="8" fill="#D85A30">тек бинарлы</text>

  <!-- Bottom separator -->
  <line x1="30" y1="526" x2="930" y2="526" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Annotations -->
  <text x="40" y="548" font-size="10" fill="#D32F2F" font-weight="600">Класс теңгерімсіздігі әмбебап, бірақ деңгейі әртүрлі</text>
  <text x="40" y="564" font-size="10" fill="#888">EyePACS: экстремалды теңгерімсіздік (73.5% DR 0) → Focal Loss қажет</text>
  <text x="40" y="580" font-size="10" fill="#888">DDR: биомодальді — DR 0 (50%) + DR 2 (36%); DR 3 ең сирек (1.9%)</text>
  <text x="40" y="596" font-size="10" fill="#888">IDRiD: ең теңгерімді 5-класс → класс бойынша бағалауға идеалды</text>

  <text x="500" y="548" font-size="10" fill="#1D9E75" font-weight="600">Clinical (KZ): жобалау бойынша толық теңгерімді</text>
  <text x="500" y="564" font-size="10" fill="#888">Класс бойынша 12 сурет, Grad-CAM бағалау үшін таңдалған</text>
  <text x="500" y="580" font-size="10" fill="#888">ODIR-5K: DR 0 жоқ — кілт сөз шығаруы тек DR-positive</text>
  <text x="500" y="596" font-size="10" fill="#888">RFMiD: бинарлы (тяжелік жоқ) — 4:1 қатынас (жоқ:бар)</text>

  <text x="480" y="622" text-anchor="middle" font-size="10" fill="#888" font-style="italic">Теңгерімсіздік үлгісі классификатор өнімділігіне тікелей әсер етеді — минорлы кластар (DR 1, DR 3) тұрақты түрде ең төмен класс бойынша F1 көрсетеді</text>
</svg>