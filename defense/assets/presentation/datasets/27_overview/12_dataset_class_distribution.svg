  <text x="760" y="284" font-size="9" fill="#aaa" font-style="italic">Аралас камералар</text>

  <text x="210" y="328" text-anchor="end" font-size="12" font-weight="600" fill="#1a1a2e">IDRiD</text>
  <text x="210" y="341" text-anchor="end" font-size="9" fill="#999">n = 516</text>
  <rect x="220" y="316" width="163.0" height="30" fill="#2E7D32"/>
  <text x="301.5" y="336" text-anchor="middle" font-size="10" fill="white" font-weight="600">33%</text>
  <rect x="383.0" y="316" width="24.0" height="30" fill="#F9A825"/>
  <rect x="407.0" y="316" width="163.0" height="30" fill="#EF6C00"/>
  <text x="488.5" y="336" text-anchor="middle" font-size="10" fill="white" font-weight="600">33%</text>
  <rect x="570.0" y="316" width="90.0" height="30" fill="#D32F2F"/>
  <text x="615.0" y="336" text-anchor="middle" font-size="10" fill="white" font-weight="600">18%</text>
