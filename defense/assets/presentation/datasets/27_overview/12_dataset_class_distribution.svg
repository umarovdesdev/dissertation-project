  <text x="210" y="391" text-anchor="end" font-size="9" fill="#999">n = 60</text>
  <rect x="220" y="366" width="100.0" height="30" fill="#2E7D32"/>
  <text x="270.0" y="386" text-anchor="middle" font-size="10" fill="white" font-weight="600">20%</text>
  <rect x="320.0" y="366" width="100.0" height="30" fill="#F9A825"/>
  <text x="370.0" y="386" text-anchor="middle" font-size="10" fill="#444" font-weight="600">20%</text>
  <rect x="420.0" y="366" width="100.0" height="30" fill="#EF6C00"/>
  <text x="470.0" y="386" text-anchor="middle" font-size="10" fill="white" font-weight="600">20%</text>
  <rect x="520.0" y="366" width="100.0" height="30" fill="#D32F2F"/>
  <text x="570.0" y="386" text-anchor="middle" font-size="10" fill="white" font-weight="600">20%</text>
  <rect x="620.0" y="366" width="100.0" height="30" fill="#6A1B9A"/>
  <text x="670.0" y="386" text-anchor="middle" font-size="10" fill="white" font-weight="600">20%</text>
  <text x="760" y="384" font-size="9" fill="#aaa" font-style="italic">Алматы, ҚР</text>

