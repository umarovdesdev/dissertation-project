<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 780" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2471a3"/>
    </marker>
    <marker id="arr-d" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1a7a4d"/>
    </marker>
    <marker id="arr-p" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7f4d90"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1060" height="780" fill="#fafbfc" rx="8"/>

  <!-- Title -->
  <text x="530" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Жүйе архитектурасы және деректер ағыны</text>
  <text x="530" y="50" text-anchor="middle" font-size="12" fill="#666">System Architecture &amp; Data Flow</text>

  <!-- ===== PATIENT INPUT ===== -->
  <rect x="40" y="64" width="170" height="36" rx="18" fill="#f0eaf5" stroke="#7f4d90" stroke-width="1.5"/>
  <text x="125" y="80" text-anchor="middle" font-size="10" fill="#7f4d90">Patient bilateral pair</text>
  <text x="125" y="94" text-anchor="middle" font-size="9" fill="#aa88bb">(I_L, I_R)</text>

  <!-- Arrows to left and right eye -->
  <line x1="85" y1="100" x2="85" y2="120" stroke="#7f4d90" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <line x1="165" y1="100" x2="165" y2="120" stroke="#7f4d90" stroke-width="1.5" marker-end="url(#arr-p)"/>

  <!-- Left eye label -->
  <rect x="38" y="122" width="95" height="24" rx="12" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="85" y="139" text-anchor="middle" font-size="10" font-weight="600" fill="#555">I_L (left eye)</text>

  <!-- Right eye label -->
  <rect x="138" y="122" width="95" height="24" rx="12" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="185" y="139" text-anchor="middle" font-size="10" font-weight="600" fill="#555">I_R (right eye)</text>

  <!-- "shared P" brace label -->
  <text x="125" y="164" text-anchor="middle" font-size="10" font-weight="600" fill="#2471a3">Shared P</text>
  <line x1="85" y1="146" x2="85" y2="172" stroke="#2471a3" stroke-width="1.2"/>
  <line x1="165" y1="146" x2="165" y2="172" stroke="#2471a3" stroke-width="1.2"/>
  <line x1="85" y1="172" x2="165" y2="172" stroke="#2471a3" stroke-width="1.2"/>
  <line x1="125" y1="172" x2="125" y2="184" stroke="#2471a3" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ===== V5 PIPELINE BOUNDARY ===== -->
  <rect x="28" y="188" width="400" height="440" rx="10" fill="#eaf2f8" fill-opacity="0.5" stroke="#2471a3" stroke-width="2"/>
  <text x="48" y="210" font-size="13" font-weight="700" fill="#1a5276">V5 Preprocessing Pipeline (P)</text>
  <text x="48" y="225" font-size="9" fill="#5499c7">8 stages | always-on (Stage 6: train only)</text>

  <!-- Stage 0 -->
  <rect x="48" y="236" width="362" height="32" rx="5" fill="#d4e6f1" stroke="#85c1e9" stroke-width="1"/>
  <text x="62" y="256" font-size="9" font-weight="700" fill="#1a5276">0</text>
  <text x="82" y="256" font-size="10" fill="#2c3e50">Canonical flip (left &#x2192; right eye)</text>
  <text x="400" y="256" text-anchor="end" font-size="9" fill="#888">RGB</text>

  <line x1="228" y1="268" x2="228" y2="276" stroke="#85c1e9" stroke-width="1"/>

  <!-- Stage 1 -->
  <rect x="48" y="278" width="362" height="32" rx="5" fill="#d4e6f1" stroke="#85c1e9" stroke-width="1"/>
  <text x="62" y="298" font-size="9" font-weight="700" fill="#1a5276">1</text>
  <text x="82" y="298" font-size="10" fill="#2c3e50">OD-fovea rotation normalization</text>
  <text x="400" y="298" text-anchor="end" font-size="9" fill="#888">RGB</text>

  <line x1="228" y1="310" x2="228" y2="318" stroke="#85c1e9" stroke-width="1"/>

  <!-- Stage 2 -->
  <rect x="48" y="320" width="362" height="32" rx="5" fill="#d4e6f1" stroke="#85c1e9" stroke-width="1"/>
  <text x="62" y="340" font-size="9" font-weight="700" fill="#1a5276">2</text>
  <text x="82" y="340" font-size="10" fill="#2c3e50">FOV crop + isotropic resize + zero-pad</text>
  <text x="400" y="340" text-anchor="end" font-size="9" fill="#888">512x512</text>

  <line x1="228" y1="352" x2="228" y2="360" stroke="#85c1e9" stroke-width="1"/>

  <!-- Stage 3 — FOV mask -->
  <rect x="48" y="362" width="362" height="32" rx="5" fill="#a9cce3" stroke="#5499c7" stroke-width="1.5"/>
  <text x="62" y="382" font-size="9" font-weight="700" fill="#1a5276">3</text>
  <text x="82" y="382" font-size="10" font-weight="600" fill="#1a5276">FOV mask generation</text>
  <text x="360" y="382" text-anchor="end" font-size="9" fill="#1a5276">&#x2192; 4th ch</text>
  <text x="400" y="382" text-anchor="end" font-size="9" fill="#1a5276">+mask</text>

  <!-- Mask branch -->
  <path d="M410,378 L425,378 L425,543" fill="none" stroke="#1a5276" stroke-width="1.3" stroke-dasharray="4,3"/>
  <text x="432" y="465" font-size="8" fill="#1a5276" transform="rotate(90,432,465)">FOV mask</text>

  <line x1="228" y1="394" x2="228" y2="402" stroke="#85c1e9" stroke-width="1"/>

  <!-- Stage 4 -->
  <rect x="48" y="404" width="362" height="32" rx="5" fill="#d4e6f1" stroke="#85c1e9" stroke-width="1"/>
  <text x="62" y="424" font-size="9" font-weight="700" fill="#1a5276">4</text>
  <text x="82" y="424" font-size="10" fill="#2c3e50">Adaptive flat-field correction</text>
  <text x="330" y="424" text-anchor="end" font-size="9" fill="#5499c7">&#963; = 0.07 &#183; D</text>
  <text x="400" y="424" text-anchor="end" font-size="9" fill="#888">RGB</text>

  <line x1="228" y1="436" x2="228" y2="444" stroke="#85c1e9" stroke-width="1"/>

  <!-- Stage 5 -->
  <rect x="48" y="446" width="362" height="32" rx="5" fill="#d4e6f1" stroke="#85c1e9" stroke-width="1"/>
  <text x="62" y="466" font-size="9" font-weight="700" fill="#1a5276">5</text>
  <text x="82" y="466" font-size="10" fill="#2c3e50">CLAHE (dual-constraint, LAB L-ch)</text>
  <text x="400" y="466" text-anchor="end" font-size="9" fill="#888">RGB</text>

  <line x1="228" y1="478" x2="228" y2="486" stroke="#85c1e9" stroke-width="1"/>

  <!-- Stage 6 (train only) -->
  <rect x="48" y="488" width="362" height="32" rx="5" fill="#fef9e7" stroke="#f4d03f" stroke-width="1.3" stroke-dasharray="5,3"/>
  <text x="62" y="508" font-size="9" font-weight="700" fill="#b7950b">6</text>
  <text x="82" y="508" font-size="10" fill="#7d6608">Augmentation (affine + PCA color)</text>
  <text x="400" y="508" text-anchor="end" font-size="9" fill="#b7950b">train only</text>

  <line x1="228" y1="520" x2="228" y2="528" stroke="#85c1e9" stroke-width="1"/>

  <!-- Stage 7 -->
  <rect x="48" y="530" width="362" height="42" rx="5" fill="#2471a3" stroke="#1a5276" stroke-width="1.5"/>
  <text x="62" y="548" font-size="9" font-weight="700" fill="#fff">7</text>
  <text x="82" y="548" font-size="10" font-weight="600" fill="#fff">Normalize + FOV mask append</text>
  <text x="82" y="564" font-size="9" fill="#aed6f1">per-channel (&#956;, &#963;) + mask &#x2192; 4ch tensor</text>

  <!-- Mask arrow joins Stage 7 -->
  <path d="M425,543 L415,548" fill="none" stroke="#1a5276" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- ===== END PIPELINE ===== -->

  <!-- Arrow from pipeline output -->
  <line x1="228" y1="572" x2="228" y2="598" stroke="#2471a3" stroke-width="1.8"/>

  <!-- Tensor label -->
  <rect x="140" y="598" width="176" height="26" rx="13" fill="#1a5276"/>
  <text x="228" y="616" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">4 x 512 x 512</text>

  <!-- Arrow to CNN -->
  <line x1="316" y1="611" x2="448" y2="611" stroke="#2471a3" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- ===== CNN SECTION ===== -->
  <rect x="452" y="188" width="350" height="440" rx="10" fill="#f8f4ee" fill-opacity="0.5" stroke="#b7950b" stroke-width="2"/>
  <text x="472" y="210" font-size="13" font-weight="700" fill="#7d6608">CNN Classifier (&#952;)</text>
  <text x="472" y="225" font-size="9" fill="#b7950b">Shared weights for both eyes</text>

  <!-- ResNet-50 block -->
  <rect x="468" y="240" width="155" height="100" rx="7" fill="#fff" stroke="#d5d8dc" stroke-width="1.5"/>
  <text x="545" y="258" text-anchor="middle" font-size="12" font-weight="700" fill="#2c3e50">ResNet-50</text>
  <line x1="480" y1="266" x2="610" y2="266" stroke="#eee" stroke-width="1"/>
  <text x="480" y="282" font-size="9" fill="#666">Conv1: 4ch &#x2192; 64, 7x7</text>
  <text x="480" y="296" font-size="9" fill="#666">Feature dim: 2048</text>
  <text x="480" y="310" font-size="9" fill="#666">Mixed precision: ON</text>
  <text x="480" y="326" font-size="8" fill="#999">ImageNet-1K V2</text>

  <!-- EfficientNet-B3 block -->
  <rect x="635" y="240" width="155" height="100" rx="7" fill="#fff" stroke="#d5d8dc" stroke-width="1.5"/>
  <text x="712" y="258" text-anchor="middle" font-size="12" font-weight="700" fill="#2c3e50">EfficientNet-B3</text>
  <line x1="647" y1="266" x2="778" y2="266" stroke="#eee" stroke-width="1"/>
  <text x="647" y="282" font-size="9" fill="#666">Stem: 4ch &#x2192; 40, 3x3</text>
  <text x="647" y="296" font-size="9" fill="#666">Feature dim: 1536</text>
  <text x="647" y="310" font-size="9" fill="#666">Mixed precision: OFF</text>
  <text x="647" y="326" font-size="8" fill="#999">ImageNet-1K (timm)</text>

  <!-- Arrows to spatial maps -->
  <line x1="545" y1="340" x2="545" y2="362" stroke="#555" stroke-width="1.2"/>
  <line x1="712" y1="340" x2="712" y2="362" stroke="#555" stroke-width="1.2"/>

  <!-- Spatial feature maps -->
  <rect x="468" y="364" width="155" height="24" rx="4" fill="#eee" stroke="#ccc"/>
  <text x="545" y="381" text-anchor="middle" font-size="9" fill="#555">2048 x 16 x 16</text>
  <rect x="635" y="364" width="155" height="24" rx="4" fill="#eee" stroke="#ccc"/>
  <text x="712" y="381" text-anchor="middle" font-size="9" fill="#555">1536 x 16 x 16</text>

  <!-- Merge to GAP -->
  <line x1="545" y1="388" x2="545" y2="406" stroke="#555" stroke-width="1.2"/>
  <line x1="712" y1="388" x2="712" y2="406" stroke="#555" stroke-width="1.2"/>
  <line x1="545" y1="406" x2="712" y2="406" stroke="#555" stroke-width="1.2"/>
  <line x1="628" y1="406" x2="628" y2="422" stroke="#555" stroke-width="1.2" marker-end="url(#arr-d)"/>

  <!-- GAP -->
  <rect x="558" y="424" width="140" height="24" rx="12" fill="#555"/>
  <text x="628" y="441" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">GAP &#x2192; f &#8712; R^d</text>

  <!-- Arrow to head -->
  <line x1="628" y1="448" x2="628" y2="468" stroke="#555" stroke-width="1.2" marker-end="url(#arr-d)"/>

  <!-- Classification head -->
  <rect x="530" y="470" width="196" height="40" rx="7" fill="#fff" stroke="#b7950b" stroke-width="1.5"/>
  <text x="628" y="488" text-anchor="middle" font-size="10" font-weight="600" fill="#7d6608">Classification Head</text>
  <text x="628" y="502" text-anchor="middle" font-size="9" fill="#999">Dropout(0.4) &#x2192; Linear(d, 5)</text>

  <!-- Arrow to softmax -->
  <line x1="628" y1="510" x2="628" y2="530" stroke="#555" stroke-width="1.2" marker-end="url(#arr-d)"/>

  <!-- Per-eye output -->
  <rect x="552" y="532" width="152" height="24" rx="4" fill="#eee" stroke="#ccc"/>
  <text x="628" y="549" text-anchor="middle" font-size="9" fill="#555">Softmax &#x2192; &#x177;_eye (DR 0-4)</text>

  <!-- Arrows showing bilateral: left eye result and right eye result -->
  <line x1="588" y1="556" x2="588" y2="580" stroke="#555" stroke-width="1.2"/>
  <line x1="668" y1="556" x2="668" y2="580" stroke="#555" stroke-width="1.2"/>

  <rect x="555" y="582" width="70" height="20" rx="4" fill="#d4e6f1" stroke="#85c1e9"/>
  <text x="590" y="596" text-anchor="middle" font-size="9" font-weight="600" fill="#1a5276">&#x177;_L</text>

  <rect x="633" y="582" width="70" height="20" rx="4" fill="#d4e6f1" stroke="#85c1e9"/>
  <text x="668" y="596" text-anchor="middle" font-size="9" font-weight="600" fill="#1a5276">&#x177;_R</text>

  <!-- ===== END CNN ===== -->

  <!-- ===== PATIENT-LEVEL AGGREGATION ===== -->
  <rect x="830" y="188" width="210" height="440" rx="10" fill="#f0eaf5" fill-opacity="0.5" stroke="#7f4d90" stroke-width="2"/>
  <text x="850" y="210" font-size="13" font-weight="700" fill="#7f4d90">Patient-Level (&#934;)</text>
  <text x="850" y="225" font-size="9" fill="#aa88bb">Bilateral aggregation</text>

  <!-- Arrows from per-eye outputs to aggregation -->
  <line x1="625" y1="602" x2="625" y2="618" stroke="#555" stroke-width="1"/>
  <line x1="625" y1="618" x2="810" y2="618" stroke="#7f4d90" stroke-width="1.5"/>
  <line x1="810" y1="618" x2="810" y2="400" stroke="#7f4d90" stroke-width="1.5"/>
  <line x1="810" y1="400" x2="828" y2="400" stroke="#7f4d90" stroke-width="1.5" marker-end="url(#arr-p)"/>

  <!-- Max-Grade strategy box -->
  <rect x="848" y="260" width="176" height="130" rx="8" fill="#fff" stroke="#7f4d90" stroke-width="1.5"/>
  <text x="936" y="282" text-anchor="middle" font-size="11" font-weight="700" fill="#7f4d90">Max-Grade Strategy</text>
  <line x1="860" y1="290" x2="1012" y2="290" stroke="#e8daf0" stroke-width="1"/>

  <text x="868" y="310" font-size="10" fill="#555">&#x177;_patient = max(&#x177;_L, &#x177;_R)</text>
  <text x="868" y="332" font-size="9" fill="#888">Нашар көз = пациент</text>
  <text x="868" y="348" font-size="9" fill="#888">деңгейі</text>
  <text x="868" y="372" font-size="9" fill="#1a7a4d">&#x2713; Қосымша параметр жоқ</text>
  <text x="868" y="386" font-size="9" fill="#1a7a4d">&#x2713; Клиникалық практикаға сәйкес</text>

  <!-- Clinical decision -->
  <line x1="936" y1="390" x2="936" y2="420" stroke="#7f4d90" stroke-width="1.5" marker-end="url(#arr-p)"/>

  <!-- Referral decision -->
  <rect x="856" y="422" width="160" height="48" rx="8" fill="#fff" stroke="#7f4d90" stroke-width="1"/>
  <text x="936" y="442" text-anchor="middle" font-size="10" font-weight="600" fill="#7f4d90">Clinical Decision</text>
  <text x="936" y="458" text-anchor="middle" font-size="9" fill="#888">&#x177; &#x2265; 2 &#x2192; referable DR</text>
  <text x="936" y="470" text-anchor="middle" font-size="8" fill="#aaa">(specialist referral)</text>

  <!-- Final patient output -->
  <line x1="936" y1="470" x2="936" y2="500" stroke="#1a7a4d" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="860" y="502" width="152" height="36" rx="18" fill="#1a7a4d"/>
  <text x="936" y="519" text-anchor="middle" font-size="10" fill="#fff">&#x177;_patient</text>
  <text x="936" y="533" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">DR Grade (0-4)</text>

  <!-- Explainability arrow -->
  <line x1="936" y1="538" x2="936" y2="566" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3"/>

  <rect x="856" y="568" width="152" height="44" rx="7" fill="#fff" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="936" y="586" text-anchor="middle" font-size="10" font-weight="600" fill="#c0392b">Grad-CAM</text>
  <text x="936" y="602" text-anchor="middle" font-size="9" fill="#999">ALO / IoU metrics</text>

  <!-- ===== BOTTOM: Training config ===== -->
  <line x1="40" y1="650" x2="1020" y2="650" stroke="#eee" stroke-width="1"/>

  <text x="530" y="674" text-anchor="middle" font-size="10" font-weight="600" fill="#555">Training Configuration</text>
  <rect x="200" y="684" width="660" height="24" rx="4" fill="#f8f8f8" stroke="#ddd"/>
  <text x="530" y="700" text-anchor="middle" font-size="9" fill="#888">Focal Loss (&#947;=2, &#945;=inv-freq) | Adam lr=1e-4 | batch=16 | 5-fold patient-level CV | early stop patience=5</text>

  <!-- Legend -->
  <text x="200" y="730" font-size="9" fill="#888">Legend:</text>
  <rect x="250" y="720" width="12" height="12" rx="2" fill="#eaf2f8" stroke="#2471a3"/>
  <text x="268" y="730" font-size="9" fill="#666">Preprocessing</text>
  <rect x="355" y="720" width="12" height="12" rx="2" fill="#f8f4ee" stroke="#b7950b"/>
  <text x="373" y="730" font-size="9" fill="#666">CNN</text>
  <rect x="415" y="720" width="12" height="12" rx="2" fill="#f0eaf5" stroke="#7f4d90"/>
  <text x="433" y="730" font-size="9" fill="#666">Patient-level</text>
  <rect x="530" y="720" width="12" height="12" rx="2" fill="#fef9e7" stroke="#f4d03f" stroke-dasharray="3,2"/>
  <text x="548" y="730" font-size="9" fill="#666">Train only</text>
  <rect x="620" y="720" width="12" height="12" rx="2" fill="#fff" stroke="#c0392b" stroke-dasharray="3,2"/>
  <text x="638" y="730" font-size="9" fill="#666">Explainability (post-hoc)</text>

</svg>
