<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">

  <rect width="960" height="430" fill="white"/>

  <!-- Title -->
  <text x="480" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">Exp 1: Preprocessing Dominance — Weighted F1 (EyePACS 100%, 5-fold CV)</text>

  <!-- Legend -->
  <g transform="translate(220, 42)">
    <rect x="0" y="0" width="14" height="14" rx="2" fill="#90A4AE"/>
    <text x="18" y="12" font-size="11" fill="#444">Baseline (3ch)</text>
    <rect x="130" y="0" width="14" height="14" rx="2" fill="#1565C0"/>
    <text x="148" y="12" font-size="11" fill="#444">Full V5 Pipeline (4ch)</text>
    <rect x="320" y="0" width="14" height="14" rx="2" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="338" y="12" font-size="11" fill="#E24B4A">EH-3 threshold (baseline + 5pp)</text>
  </g>

  <!-- Y-axis: F1 from 0.70 (y=320) to 0.82 (y=80), scale = 2000px/unit -->

  <!-- Grid lines -->
  <line x1="180" y1="320" x2="790" y2="320" stroke="#e0e0e0" stroke-width="1"/>
  <text x="172" y="324" text-anchor="end" font-size="10" fill="#bbb">0.70</text>

  <line x1="180" y1="280" x2="790" y2="280" stroke="#f5f5f5" stroke-width="0.5"/>
  <text x="172" y="284" text-anchor="end" font-size="10" fill="#bbb">0.72</text>

  <line x1="180" y1="240" x2="790" y2="240" stroke="#f5f5f5" stroke-width="0.5"/>
  <text x="172" y="244" text-anchor="end" font-size="10" fill="#bbb">0.74</text>

  <line x1="180" y1="200" x2="790" y2="200" stroke="#f5f5f5" stroke-width="0.5"/>
  <text x="172" y="204" text-anchor="end" font-size="10" fill="#bbb">0.76</text>

  <line x1="180" y1="160" x2="790" y2="160" stroke="#f5f5f5" stroke-width="0.5"/>
  <text x="172" y="164" text-anchor="end" font-size="10" fill="#bbb">0.78</text>

  <line x1="180" y1="120" x2="790" y2="120" stroke="#f5f5f5" stroke-width="0.5"/>
  <text x="172" y="124" text-anchor="end" font-size="10" fill="#bbb">0.80</text>

  <line x1="180" y1="80" x2="790" y2="80" stroke="#f5f5f5" stroke-width="0.5"/>
  <text x="172" y="84" text-anchor="end" font-size="10" fill="#bbb">0.82</text>

  <!-- EH-3 threshold for ResNet: Config A 0.724 + 5pp = 0.774 → y = (0.82-0.774)*2000=92 → y=80+92=172 -->
  <line x1="220" y1="172" x2="420" y2="172" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="422" y="176" font-size="8" fill="#E24B4A">0.774</text>

  <!-- EH-3 threshold for EfficientNet: Config C 0.727 + 5pp = 0.777 → y = (0.82-0.777)*2000=86 → y=80+86=166 -->
  <line x1="525" y1="166" x2="725" y2="166" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="727" y="170" font-size="8" fill="#E24B4A">0.777</text>

  <!-- ════ ResNet-50 Group ════ -->

  <!-- Config A: F1=0.724±0.011 → y_top = (0.82-0.724)*2000=192 → y=80+192=272 -->
  <!-- bar height from 0.70: (0.724-0.70)*2000=48 -->
  <rect x="230" y="272" width="85" height="48" fill="#90A4AE" rx="3"/>
  <!-- Error bar: ±0.011 → 0.011*2000=22px -->
  <line x1="272" y1="250" x2="272" y2="294" stroke="#555" stroke-width="1.5"/>
  <line x1="264" y1="250" x2="280" y2="250" stroke="#555" stroke-width="1.5"/>
  <line x1="264" y1="294" x2="280" y2="294" stroke="#555" stroke-width="1.5"/>
  <text x="272" y="244" text-anchor="middle" font-size="13" fill="#555" font-weight="700">0.724</text>
  <text x="272" y="336" text-anchor="middle" font-size="12" fill="#666" font-weight="600">A</text>

  <!-- Config B: F1=0.776±0.009 → y_top = (0.82-0.776)*2000=88 → y=80+88=168 -->
  <!-- bar height: (0.776-0.70)*2000=152 -->
  <rect x="325" y="168" width="85" height="152" fill="#1565C0" rx="3"/>
  <!-- Error bar: ±0.009 → 0.009*2000=18px -->
  <line x1="367" y1="150" x2="367" y2="186" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="359" y1="150" x2="375" y2="150" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="359" y1="186" x2="375" y2="186" stroke="#1565C0" stroke-width="1.5"/>
  <text x="367" y="143" text-anchor="middle" font-size="13" fill="#1565C0" font-weight="700">0.776</text>
  <text x="367" y="336" text-anchor="middle" font-size="12" fill="#666" font-weight="600">B</text>

  <!-- Delta: +5.2pp (green badge, significant) -->
  <rect x="293" y="112" width="60" height="20" rx="4" fill="#2E7D32"/>
  <text x="323" y="126" text-anchor="middle" font-size="12" fill="white" font-weight="700">+5.2pp</text>
  <line x1="272" y1="122" x2="293" y2="122" stroke="#2E7D32" stroke-width="1"/>
  <line x1="353" y1="122" x2="367" y2="122" stroke="#2E7D32" stroke-width="1"/>

  <!-- p-value annotation -->
  <text x="323" y="107" text-anchor="middle" font-size="9" fill="#2E7D32" font-weight="600">p=0.006 (DeLong)</text>

  <!-- Group label -->
  <text x="300" y="362" text-anchor="middle" font-size="14" fill="#1a1a2e" font-weight="600">ResNet-50</text>

  <!-- ════ EfficientNet-B3 Group ════ -->

  <!-- Config C: F1=0.727±0.033 → y_top = (0.82-0.727)*2000=186 → y=80+186=266 -->
  <rect x="535" y="266" width="85" height="54" fill="#90A4AE" rx="3"/>
  <!-- Error bar: ±0.033 → 0.033*2000=66px -->
  <line x1="577" y1="233" x2="577" y2="299" stroke="#555" stroke-width="1.5"/>
  <line x1="569" y1="233" x2="585" y2="233" stroke="#555" stroke-width="1.5"/>
  <line x1="569" y1="299" x2="585" y2="299" stroke="#555" stroke-width="1.5"/>
  <text x="577" y="225" text-anchor="middle" font-size="13" fill="#555" font-weight="700">0.727</text>
  <text x="577" y="336" text-anchor="middle" font-size="12" fill="#666" font-weight="600">C</text>

  <!-- Config D: F1=0.780±0.022 → y_top = (0.82-0.780)*2000=80 → y=80+80=160 -->
  <rect x="630" y="160" width="85" height="160" fill="#1565C0" rx="3"/>
  <!-- Error bar: ±0.022 → 0.022*2000=44px -->
  <line x1="672" y1="138" x2="672" y2="182" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="664" y1="138" x2="680" y2="138" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="664" y1="182" x2="680" y2="182" stroke="#1565C0" stroke-width="1.5"/>
  <text x="672" y="132" text-anchor="middle" font-size="13" fill="#1565C0" font-weight="700">0.780</text>
  <text x="672" y="336" text-anchor="middle" font-size="12" fill="#666" font-weight="600">D</text>

  <!-- Delta: +5.3pp (green badge, significant) -->
  <rect x="598" y="102" width="60" height="20" rx="4" fill="#2E7D32"/>
  <text x="628" y="116" text-anchor="middle" font-size="12" fill="white" font-weight="700">+5.3pp</text>
  <line x1="577" y1="112" x2="598" y2="112" stroke="#2E7D32" stroke-width="1"/>
  <line x1="658" y1="112" x2="672" y2="112" stroke="#2E7D32" stroke-width="1"/>

  <!-- p-value annotation -->
  <text x="628" y="97" text-anchor="middle" font-size="9" fill="#2E7D32" font-weight="600">p=0.008 (DeLong)</text>

  <!-- Group label -->
  <text x="605" y="362" text-anchor="middle" font-size="14" fill="#1a1a2e" font-weight="600">EfficientNet-B3</text>

  <!-- Separator between groups -->
  <line x1="480" y1="80" x2="480" y2="330" stroke="#eeeeee" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Footer -->
  <text x="480" y="392" text-anchor="middle" font-size="11" fill="#999" font-style="italic">EyePACS 100% (35 126 image) | 5-fold patient-level CV | Focal Loss (&#947;=2) | seed=42</text>
  <text x="480" y="410" text-anchor="middle" font-size="10" fill="#999">H-1 confirmed: EH-3 &#10003; both architectures &#x2014; preprocessing robust main effect (ANOVA p&lt;0.001, interaction p=0.23 n.s.)</text>

</svg>
