<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">

  <rect width="960" height="430" fill="white"/>

  <!-- Title -->
  <text x="480" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#1a1a2e">Деректер жиынтықтарының класс бөлінісі (DR 0–4)</text>

  <!-- Legend -->
  <g transform="translate(150, 48)">
    <rect x="0" y="0" width="14" height="14" rx="2" fill="#2E7D32"/>
    <text x="18" y="12" font-size="11" fill="#444">DR 0 — No DR</text>

    <rect x="130" y="0" width="14" height="14" rx="2" fill="#F9A825"/>
    <text x="148" y="12" font-size="11" fill="#444">DR 1 — Mild</text>

    <rect x="245" y="0" width="14" height="14" rx="2" fill="#EF6C00"/>
    <text x="263" y="12" font-size="11" fill="#444">DR 2 — Moderate</text>

    <rect x="390" y="0" width="14" height="14" rx="2" fill="#D32F2F"/>
    <text x="408" y="12" font-size="11" fill="#444">DR 3 — Severe</text>

    <rect x="510" y="0" width="14" height="14" rx="2" fill="#6A1B9A"/>
    <text x="528" y="12" font-size="11" fill="#444">DR 4 — PDR</text>
  </g>

  <!-- Separator -->
  <line x1="30" y1="74" x2="930" y2="74" stroke="#E0E0E0" stroke-width="1"/>

  <!-- 100% dashed reference line -->
  <line x1="720" y1="82" x2="720" y2="335" stroke="#E0E0E0" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="720" y="345" text-anchor="middle" font-size="8" fill="#CCC">100%</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- EyePACS: 73% / 7% / 15% / 2% / 3%          -->
  <!-- Bar widths: 365, 35, 75, 10, 15  = 500      -->
  <!-- ════════════════════════════════════════════ -->
  <text x="210" y="107" text-anchor="end" font-size="14" font-weight="600" fill="#1a1a2e">EyePACS</text>
  <text x="210" y="122" text-anchor="end" font-size="11" fill="#999">n = 35 126</text>

  <rect x="220" y="92" width="365" height="36" fill="#2E7D32"/>
  <text x="402" y="115" text-anchor="middle" font-size="12" fill="white" font-weight="600">73%</text>

  <rect x="585" y="92" width="35" height="36" fill="#F9A825"/>
  <text x="602" y="115" text-anchor="middle" font-size="9" fill="#444" font-weight="600">7%</text>

  <rect x="620" y="92" width="75" height="36" fill="#EF6C00"/>
  <text x="657" y="115" text-anchor="middle" font-size="11" fill="white" font-weight="600">15%</text>

  <rect x="695" y="92" width="10" height="36" fill="#D32F2F"/>

  <rect x="705" y="92" width="15" height="36" fill="#6A1B9A"/>
  <text x="733" y="115" font-size="9" fill="#999">5%</text>

  <text x="750" y="113" font-size="10" fill="#aaa" font-style="italic">Canon CR-1</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- APTOS 2019: 49% / 10% / 27% / 5% / 9%      -->
  <!-- Bar widths: 245, 50, 135, 25, 45  = 500     -->
  <!-- ════════════════════════════════════════════ -->
  <text x="210" y="172" text-anchor="end" font-size="14" font-weight="600" fill="#1a1a2e">APTOS 2019</text>
  <text x="210" y="187" text-anchor="end" font-size="11" fill="#999">n = 3 662</text>

  <rect x="220" y="157" width="245" height="36" fill="#2E7D32"/>
  <text x="342" y="180" text-anchor="middle" font-size="12" fill="white" font-weight="600">49%</text>

  <rect x="465" y="157" width="50" height="36" fill="#F9A825"/>
  <text x="490" y="180" text-anchor="middle" font-size="10" fill="#444" font-weight="600">10%</text>

  <rect x="515" y="157" width="135" height="36" fill="#EF6C00"/>
  <text x="582" y="180" text-anchor="middle" font-size="11" fill="white" font-weight="600">27%</text>

  <rect x="650" y="157" width="25" height="36" fill="#D32F2F"/>
  <text x="662" y="180" text-anchor="middle" font-size="9" fill="white" font-weight="600">5%</text>

  <rect x="675" y="157" width="45" height="36" fill="#6A1B9A"/>
  <text x="697" y="180" text-anchor="middle" font-size="10" fill="white" font-weight="600">9%</text>

  <text x="750" y="178" font-size="10" fill="#aaa" font-style="italic">Аралас камералар</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- IDRiD: 33% / 5% / 32% / 18% / 12%          -->
  <!-- Bar widths: 163, 24, 163, 90, 60  = 500     -->
  <!-- ════════════════════════════════════════════ -->
  <text x="210" y="237" text-anchor="end" font-size="14" font-weight="600" fill="#1a1a2e">IDRiD</text>
  <text x="210" y="252" text-anchor="end" font-size="11" fill="#999">n = 516</text>

  <rect x="220" y="222" width="163" height="36" fill="#2E7D32"/>
  <text x="301" y="245" text-anchor="middle" font-size="12" fill="white" font-weight="600">33%</text>

  <rect x="383" y="222" width="24" height="36" fill="#F9A825"/>

  <rect x="407" y="222" width="163" height="36" fill="#EF6C00"/>
  <text x="488" y="245" text-anchor="middle" font-size="12" fill="white" font-weight="600">32%</text>

  <rect x="570" y="222" width="90" height="36" fill="#D32F2F"/>
  <text x="615" y="245" text-anchor="middle" font-size="11" fill="white" font-weight="600">18%</text>

  <rect x="660" y="222" width="60" height="36" fill="#6A1B9A"/>
  <text x="690" y="245" text-anchor="middle" font-size="11" fill="white" font-weight="600">12%</text>

  <text x="750" y="243" font-size="10" fill="#aaa" font-style="italic">Kowa VX-10&#945;</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- Clinical: 20% / 20% / 20% / 20% / 20%      -->
  <!-- Bar widths: 100, 100, 100, 100, 100  = 500  -->
  <!-- ════════════════════════════════════════════ -->
  <text x="210" y="302" text-anchor="end" font-size="14" font-weight="600" fill="#1a1a2e">Clinical (KZ)</text>
  <text x="210" y="317" text-anchor="end" font-size="11" fill="#999">n = 60</text>

  <rect x="220" y="287" width="100" height="36" fill="#2E7D32"/>
  <text x="270" y="310" text-anchor="middle" font-size="11" fill="white" font-weight="600">20%</text>

  <rect x="320" y="287" width="100" height="36" fill="#F9A825"/>
  <text x="370" y="310" text-anchor="middle" font-size="11" fill="#444" font-weight="600">20%</text>

  <rect x="420" y="287" width="100" height="36" fill="#EF6C00"/>
  <text x="470" y="310" text-anchor="middle" font-size="11" fill="white" font-weight="600">20%</text>

  <rect x="520" y="287" width="100" height="36" fill="#D32F2F"/>
  <text x="570" y="310" text-anchor="middle" font-size="11" fill="white" font-weight="600">20%</text>

  <rect x="620" y="287" width="100" height="36" fill="#6A1B9A"/>
  <text x="670" y="310" text-anchor="middle" font-size="11" fill="white" font-weight="600">20%</text>

  <text x="750" y="308" font-size="10" fill="#aaa" font-style="italic">Алматы, &#1178;&#1056;</text>

  <!-- Bottom separator -->
  <line x1="30" y1="340" x2="930" y2="340" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Footer annotations -->
  <text x="220" y="362" font-size="11" fill="#D32F2F" font-weight="600">&#8593; Класс те&#1187;герімсіздігі</text>
  <text x="220" y="378" font-size="10" fill="#888">EyePACS: DR 0 класы 73% &#8212; Focal Loss (&#947;=2, &#945;=inverse-freq) &#1179;олданылуыны&#1187; негізгі себебі</text>

  <text x="600" y="362" font-size="11" fill="#2E7D32" font-weight="600">&#8595; Те&#1187;герімді б&#1257;лу</text>
  <text x="600" y="378" font-size="10" fill="#888">Clinical: &#1241;р класс бойынша 12 сурет (30 пациент)</text>

  <!-- Percentage scale ticks at bottom -->
  <text x="220" y="395" font-size="8" fill="#CCC" text-anchor="middle">0%</text>
  <text x="345" y="395" font-size="8" fill="#CCC" text-anchor="middle">25%</text>
  <text x="470" y="395" font-size="8" fill="#CCC" text-anchor="middle">50%</text>
  <text x="595" y="395" font-size="8" fill="#CCC" text-anchor="middle">75%</text>
  <text x="720" y="395" font-size="8" fill="#CCC" text-anchor="middle">100%</text>

</svg>
